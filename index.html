<!-- ↓ scriptだけ差し替え -->

<script>
(() => {
"use strict";

/* =========================
   ★外部DBロード（失敗してもOK）
========================= */
let PRODUCTS = [];
async function loadDB(){
  try{
    const res = await fetch("products.json");
    if(res.ok){
      PRODUCTS = await res.json();
      console.log("外部DB読込成功", PRODUCTS.length);
      return;
    }
  }catch(e){}
  console.log("内蔵DB使用");
}

/* =========================
   OCR 強化エンジン
========================= */
let worker=null;

async function getWorker(){
  if(worker) return worker;

  worker = await Tesseract.createWorker("eng");
  await worker.setParameters({
    tessedit_pageseg_mode:"7",
    tessedit_char_whitelist:"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_/.",
    user_defined_dpi:"300"
  });
  return worker;
}

/* =========================
   画像処理（強化）
========================= */
function enhance(canvas){
  const ctx=canvas.getContext("2d");
  const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=img.data;

  for(let i=0;i<d.length;i+=4){
    let g = d[i]*0.3 + d[i+1]*0.59 + d[i+2]*0.11;

    // コントラスト強化
    g = (g-128)*2 +128;

    // 二値化
    g = g>140?255:0;

    d[i]=d[i+1]=d[i+2]=g;
  }
  ctx.putImageData(img,0,0);
  return canvas;
}

/* =========================
   スキャン（最強版）
========================= */
async function scanPro(video){

  const canvas=document.createElement("canvas");
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  canvas.getContext("2d").drawImage(video,0,0);

  const parts=[
    crop(canvas,0.2,0.4,0.6,0.2), //中央
    crop(canvas,0.2,0.2,0.6,0.2), //上
    crop(canvas,0.2,0.6,0.6,0.2), //下
    crop(canvas,0,0,1,1),         //全体
  ];

  const w = await getWorker();

  let bestText="";
  let bestScore=0;

  for(const p of parts){
    const img = enhance(p);

    const res = await w.recognize(img);
    const text = res.data.text;
    const conf = res.data.confidence;

    const score = conf + (text.length*2);

    if(score>bestScore){
      bestScore=score;
      bestText=text;
    }
  }

  return bestText;
}

/* =========================
   カメラ（背面固定）
========================= */
async function startCamera(video){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ exact:"environment" }
      }
    });
    video.srcObject = stream;
    await video.play();
  }catch(e){
    // fallback
    const stream = await navigator.mediaDevices.getUserMedia({
      video:true
    });
    video.srcObject = stream;
  }
}

/* =========================
   crop
========================= */
function crop(c,x,y,w,h){
  const canvas=document.createElement("canvas");
  canvas.width=c.width*w;
  canvas.height=c.height*h;

  canvas.getContext("2d").drawImage(
    c,
    c.width*x,
    c.height*y,
    c.width*w,
    c.height*h,
    0,0,
    canvas.width,
    canvas.height
  );
  return canvas;
}

/* =========================
   PWA
========================= */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

/* =========================
   init
========================= */
loadDB();

window.startCamera=startCamera;
window.scanPro=scanPro;

})();
</script>
