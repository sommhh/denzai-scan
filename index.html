<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>電材スキャンPRO ガイド枠版</title>
<meta name="theme-color" content="#101418">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --bg:#101418;
  --card:#1b2229;
  --card2:#24303a;
  --text:#fff;
  --muted:#b0bec5;
  --green:#00c853;
  --blue:#2962ff;
  --red:#d50000;
  --line:#06c755;
  --gray:#546e7a;
  --border:#31414d;
  --guide:#69f0ae;
  --guideBg:rgba(105,240,174,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
}
.wrap{
  max-width:920px;
  margin:auto;
  padding:12px;
}
h1{
  margin:8px 0 14px;
  font-size:22px;
  text-align:center;
}
.card{
  background:var(--card);
  border-radius:14px;
  padding:12px;
  margin:10px 0;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
.title{
  font-size:18px;
  font-weight:700;
  margin-bottom:10px;
}
.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.col{
  flex:1 1 220px;
}
input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f151a;
  color:#fff;
  font-size:16px;
  outline:none;
}
textarea{
  min-height:90px;
  resize:vertical;
}
button, .btn{
  width:100%;
  padding:13px 12px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  text-align:center;
}
button:active, .btn:active{
  transform:scale(0.98);
  opacity:.92;
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}
.btn-green{background:var(--green)}
.btn-blue{background:var(--blue)}
.btn-red{background:var(--red)}
.btn-line{background:var(--line)}
.btn-gray{background:var(--gray)}
.camera-wrap{
  position:relative;
  width:100%;
  margin-top:10px;
}
video{
  width:100%;
  max-height:56vh;
  background:#000;
  border-radius:12px;
  object-fit:cover;
  display:block;
}
.guide-box{
  position:absolute;
  left:50%;
  top:50%;
  width:78%;
  height:18%;
  transform:translate(-50%,-50%);
  border:3px solid var(--guide);
  border-radius:14px;
  background:var(--guideBg);
  box-shadow:0 0 0 9999px rgba(0,0,0,.18) inset;
  pointer-events:none;
}
.guide-box::before{
  content:"品番をこの枠に合わせる";
  position:absolute;
  top:-30px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.65);
  color:#fff;
  font-size:12px;
  padding:4px 10px;
  border-radius:999px;
  white-space:nowrap;
}
.guide-line{
  position:absolute;
  left:8%;
  right:8%;
  top:50%;
  height:2px;
  background:rgba(105,240,174,.9);
  transform:translateY(-50%);
}
.small{
  font-size:12px;
  color:var(--muted);
}
.status{
  margin-top:8px;
  min-height:20px;
  font-size:14px;
  font-weight:700;
  color:#90caf9;
}
.links{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-top:8px;
}
.links a{
  display:block;
  background:var(--blue);
  color:#fff;
  text-decoration:none;
  text-align:center;
  padding:11px;
  border-radius:10px;
  font-weight:700;
}
.list{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.item{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  transition:background-color .35s ease, box-shadow .35s ease, border-color .35s ease;
}
.item.flash{
  background:#124d2f;
  border-color:#69f0ae;
  box-shadow:0 0 0 2px rgba(105,240,174,.25), 0 0 18px rgba(105,240,174,.18);
}
.item-code{
  font-size:16px;
  font-weight:700;
  word-break:break-all;
}
.item-meta{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
  white-space:pre-wrap;
}
.item-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:8px;
}
.item-actions button,.item-actions a{
  width:auto;
  padding:8px 10px;
  font-size:13px;
}
.badge{
  display:inline-block;
  background:#37474f;
  color:#fff;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
}
.order-preview{
  white-space:pre-wrap;
  background:#0f151a;
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  line-height:1.6;
  font-size:14px;
}
.suggest-wrap{
  margin-top:10px;
}
.suggest-chip{
  display:inline-block;
  background:#37474f;
  color:#fff;
  padding:8px 10px;
  border-radius:999px;
  margin:4px 4px 0 0;
  font-size:13px;
  cursor:pointer;
}
.mt8{margin-top:8px}
.mt10{margin-top:10px}
@media (max-width:640px){
  .links{grid-template-columns:1fr}
  .guide-box{
    width:84%;
    height:16%;
  }
}
@media print{
  body{background:#fff;color:#000}
  .no-print{display:none !important}
  .card,.item,.order-preview{
    background:#fff;
    color:#000;
    box-shadow:none;
    border:1px solid #ccc;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <h1>電材スキャンPRO ガイド枠版</h1>

  <div class="card no-print">
    <div class="title">読取・入力</div>

    <div class="row">
      <div class="col">
        <input id="manual" placeholder="品番を入力またはスキャン">
      </div>
      <div class="col">
        <button class="btn-green" id="addManualBtn">手入力を追加</button>
      </div>
    </div>

    <div class="row mt8">
      <div class="col"><button class="btn-green" id="startBtn">カメラ起動</button></div>
      <div class="col"><button class="btn-blue" id="scanBtn">スキャン</button></div>
      <div class="col"><button class="btn-gray" id="stopBtn">停止</button></div>
    </div>

    <div class="small mt8">品番ラベルを中央の緑枠に合わせてスキャンしてください。メーカー不明でも候補表示します。</div>

    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="guide-box">
        <div class="guide-line"></div>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div id="ocrBox" class="mt10" style="display:none;">
      <div class="small">スキャン候補</div>
      <div class="list" id="ocrCandidates"></div>
    </div>

    <div id="linksBox" class="mt10" style="display:none;">
      <div class="small">検索リンク</div>
      <div class="links" id="links"></div>
    </div>

    <div class="suggest-wrap">
      <div class="small">よく使う候補</div>
      <div id="suggestions"></div>
    </div>
  </div>

  <div class="card">
    <div class="title">現在の追加リスト</div>
    <div><span class="badge" id="currentCount">0件</span></div>
    <div class="list mt8" id="currentList"></div>
    <div class="row no-print mt8">
      <div class="col"><button class="btn-red" id="clearCurrentBtn">現在リスト全削除</button></div>
    </div>
  </div>

  <div class="card">
    <div class="title">注文情報</div>
    <div class="row">
      <div class="col"><input id="companyName" placeholder="会社名"></div>
      <div class="col"><input id="personName" placeholder="担当者"></div>
    </div>
    <div class="row mt8">
      <div class="col"><textarea id="remarks" placeholder="備考"></textarea></div>
    </div>
    <div class="row no-print mt8">
      <div class="col"><button class="btn-blue" id="buildOrderBtn">注文文を作成</button></div>
      <div class="col"><button class="btn-green" id="saveHistoryBtn">履歴として保存</button></div>
    </div>
    <div class="order-preview mt8" id="orderPreview">ここに注文文が表示されます。</div>
    <div class="row no-print mt8">
      <div class="col"><button class="btn-green" id="copyBtn">注文文をコピー</button></div>
      <div class="col"><a class="btn btn-line" id="lineBtn" href="#" target="_blank" rel="noopener">LINEで共有</a></div>
      <div class="col"><button class="btn-gray" id="printBtn">印刷</button></div>
    </div>
  </div>

  <div class="card">
    <div class="title">保存履歴</div>
    <div><span class="badge" id="historyCount">0件</span></div>
    <div class="list mt8" id="historyList"></div>
    <div class="row no-print mt8">
      <div class="col"><button class="btn-red" id="clearHistoryBtn">履歴を全削除</button></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
(() => {
  "use strict";

  const PRODUCTS = [
    { code:"WTF1502WK", name:"コスモシリーズワイド21 埋込ダブルコンセント", maker:"Panasonic", category:"配線器具", aliases:["WTF1502","WTFI502WK","WTF-1502WK"] },
    { code:"WT50519", name:"コスモシリーズワイド21 埋込ほたるスイッチB", maker:"Panasonic", category:"配線器具", aliases:["WT5051","WT5O519","WT-50519"] },
    { code:"WTA5051", name:"アドバンスシリーズ スイッチ", maker:"Panasonic", category:"配線器具", aliases:["WTA5O51","WTA-5051"] },
    { code:"WN5001", name:"埋込コンセント", maker:"Panasonic", category:"配線器具", aliases:["WN5OO1","WN-5001"] },
    { code:"WK4102K", name:"防雨コンセント", maker:"Panasonic", category:"配線器具", aliases:["WK41O2K","WK-4102K"] }
  ];

  const STORAGE_KEYS = {
    current: "denzai_current_guide_v1",
    history: "denzai_history_guide_v1",
    freq: "denzai_freq_guide_v1"
  };

  const $ = id => document.getElementById(id);

  const els = {
    manual: $("manual"),
    addManualBtn: $("addManualBtn"),
    video: $("video"),
    status: $("status"),
    ocrBox: $("ocrBox"),
    ocrCandidates: $("ocrCandidates"),
    linksBox: $("linksBox"),
    links: $("links"),
    suggestions: $("suggestions"),
    currentList: $("currentList"),
    currentCount: $("currentCount"),
    companyName: $("companyName"),
    personName: $("personName"),
    remarks: $("remarks"),
    orderPreview: $("orderPreview"),
    lineBtn: $("lineBtn"),
    historyList: $("historyList"),
    historyCount: $("historyCount"),
    startBtn: $("startBtn"),
    scanBtn: $("scanBtn"),
    stopBtn: $("stopBtn"),
    buildOrderBtn: $("buildOrderBtn"),
    saveHistoryBtn: $("saveHistoryBtn"),
    copyBtn: $("copyBtn"),
    printBtn: $("printBtn"),
    clearCurrentBtn: $("clearCurrentBtn"),
    clearHistoryBtn: $("clearHistoryBtn")
  };

  let stream = null;
  let worker = null;
  let currentScanCandidates = [];
  let isScanning = false;
  let isStartingCamera = false;

  function load(key, fallback){
    try{
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : fallback;
    }catch(e){
      return fallback;
    }
  }

  function save(key, value){
    localStorage.setItem(key, JSON.stringify(value));
  }

  function nowIso(){
    return new Date().toISOString();
  }

  function formatDate(iso){
    const d = new Date(iso);
    if(isNaN(d)) return "";
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    return y + "/" + m + "/" + day + " " + hh + ":" + mm;
  }

  function escapeHtml(str){
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function normalizeCode(str){
    return String(str || "")
      .toUpperCase()
      .replace(/[　\s]+/g, "")
      .replace(/[()（）[\]【】]/g, "")
      .replace(/[^A-Z0-9\-_/.\u30FC]/g, "");
  }

  function normalizeLoose(str){
    return normalizeCode(str).replace(/[-_/.\u30FC]/g, "");
  }

  function setStatus(msg, type){
    els.status.textContent = msg || "";
    if(type === "error"){
      els.status.style.color = "#ef9a9a";
    }else if(type === "success"){
      els.status.style.color = "#69f0ae";
    }else{
      els.status.style.color = "#90caf9";
    }
  }

  function getCurrent(){
    return load(STORAGE_KEYS.current, []);
  }

  function saveCurrent(list){
    save(STORAGE_KEYS.current, list);
  }

  function getHistory(){
    return load(STORAGE_KEYS.history, []);
  }

  function saveHistory(list){
    save(STORAGE_KEYS.history, list);
  }

  function bumpFreq(code){
    const freq = load(STORAGE_KEYS.freq, {});
    const key = normalizeCode(code);
    if(!key) return;
    freq[key] = (freq[key] || 0) + 1;
    save(STORAGE_KEYS.freq, freq);
    renderSuggestions();
  }

  function getBestProductInfo(code){
    const n = normalizeLoose(code);
    if(!n) return null;

    for(const p of PRODUCTS){
      if(normalizeLoose(p.code) === n) return p;
      if((p.aliases || []).some(a => normalizeLoose(a) === n)) return p;
    }

    for(const p of PRODUCTS){
      if(normalizeLoose(p.code).includes(n) || n.includes(normalizeLoose(p.code))) return p;
      if((p.aliases || []).some(a => normalizeLoose(a).includes(n) || n.includes(normalizeLoose(a)))) return p;
    }

    return null;
  }

  function addCurrentItem(code){
    const normalized = normalizeCode(code);
    if(!normalized) return;

    const list = getCurrent();
    const existing = list.find(x => normalizeCode(x.code) === normalized);

    if(existing){
      existing.qty = (existing.qty || 1) + 1;
    }else{
      const info = getBestProductInfo(normalized);
      list.unshift({
        id: "id_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8),
        code: normalized,
        name: info ? info.name : "",
        maker: info ? info.maker : "",
        category: info ? info.category : "",
        qty: 1,
        createdAt: nowIso()
      });
    }

    saveCurrent(list);
    bumpFreq(normalized);
    renderCurrent();
    renderLinks(normalized);
    flashCurrentItem(normalized);
  }

  function flashCurrentItem(code){
    const list = getCurrent();
    const item = list.find(x => normalizeCode(x.code) === normalizeCode(code));
    if(!item) return;

    const el = document.querySelector('[data-item-id="' + CSS.escape(item.id) + '"]');
    if(!el) return;

    el.classList.add("flash");
    setTimeout(() => el.classList.remove("flash"), 1200);
  }

  function changeQty(id, diff){
    const list = getCurrent();
    const item = list.find(x => x.id === id);
    if(!item) return;

    item.qty = Math.max(1, (item.qty || 1) + diff);
    saveCurrent(list);
    renderCurrent();
  }

  function removeCurrentItem(id){
    const list = getCurrent().filter(x => x.id !== id);
    saveCurrent(list);
    renderCurrent();
  }

  function clearCurrent(){
    saveCurrent([]);
    renderCurrent();
  }

  function buildOrderText(){
    const company = els.companyName.value.trim();
    const person = els.personName.value.trim();
    const remarks = els.remarks.value.trim();
    const list = getCurrent();

    if(!list.length){
      return "現在の追加リストがありません。";
    }

    let lines = [];
    if(company) lines.push(company);
    if(person) lines.push(person + " 様");
    if(company || person) lines.push("");

    lines.push("お世話になっております。");
    lines.push("下記商品の手配をお願いいたします。");
    lines.push("");

    list.forEach((item, i) => {
      const label = item.name ? item.code + " / " + item.name : item.code;
      lines.push((i + 1) + ". " + label + " × " + (item.qty || 1));
    });

    if(remarks){
      lines.push("");
      lines.push("備考");
      lines.push(remarks);
    }

    return lines.join("\n");
  }

  function updateOrderPreview(){
    const text = buildOrderText();
    els.orderPreview.textContent = text;
    els.lineBtn.href = "https://line.me/R/msg/text/?" + encodeURIComponent(text);
  }

  function saveCurrentToHistory(){
    const list = getCurrent();
    if(!list.length){
      setStatus("保存するリストがありません", "error");
      return;
    }

    const history = getHistory();
    history.unshift({
      id: "h_" + Date.now(),
      createdAt: nowIso(),
      companyName: els.companyName.value.trim(),
      personName: els.personName.value.trim(),
      remarks: els.remarks.value.trim(),
      items: list,
      orderText: buildOrderText()
    });

    saveHistory(history.slice(0, 100));
    renderHistory();
    setStatus("履歴として保存しました", "success");
  }

  function renderCandidates(){
    els.ocrBox.style.display = "block";

    if(!currentScanCandidates.length){
      els.ocrCandidates.innerHTML = '<div class="item"><div class="item-meta">候補なし</div></div>';
      return;
    }

    let html = "";
    for(let i = 0; i < currentScanCandidates.length; i++){
      const code = currentScanCandidates[i];
      const info = getBestProductInfo(code);

      html += `
        <div class="item">
          <div class="item-code">${escapeHtml(code)}</div>
          <div class="item-meta">${escapeHtml(info && info.maker ? info.maker : "メーカー不明")}${info && info.category ? " / " + escapeHtml(info.category) : ""}</div>
          <div class="item-meta">${escapeHtml(info && info.name ? info.name : "辞書未登録候補")}</div>
          <div class="item-actions">
            <button class="btn-green" onclick="window.useScanCandidate(${i})">この候補を使う</button>
            <button class="btn-red" onclick="window.removeScanCandidate(${i})">消す</button>
          </div>
        </div>
      `;
    }
    els.ocrCandidates.innerHTML = html;
  }

  function renderLinks(code){
    const p = normalizeCode(code);
    if(!p){
      els.linksBox.style.display = "none";
      els.links.innerHTML = "";
      return;
    }

    els.linksBox.style.display = "block";
    const q1 = encodeURIComponent(p);
    const q2 = encodeURIComponent(p + " 仕様書");
    const q3 = encodeURIComponent(p + " 図面");
    const q4 = encodeURIComponent(p + " カタログ");

    els.links.innerHTML = `
      <a href="https://www.google.com/search?q=${q1}" target="_blank" rel="noopener">検索</a>
      <a href="https://www.google.com/search?q=${q2}" target="_blank" rel="noopener">仕様書</a>
      <a href="https://www.google.com/search?q=${q3}" target="_blank" rel="noopener">図面</a>
      <a href="https://www.google.com/search?q=${q4}" target="_blank" rel="noopener">カタログ</a>
    `;
  }

  function renderCurrent(){
    const list = getCurrent();
    els.currentCount.textContent = list.length + "件";

    if(!list.length){
      els.currentList.innerHTML = '<div class="small">まだ追加されていません。</div>';
      return;
    }

    let html = "";
    for(let i = 0; i < list.length; i++){
      const item = list[i];
      html += `
        <div class="item" data-item-id="${escapeHtml(item.id)}">
          <div class="item-code">${escapeHtml(item.code)}${item.name ? " / " + escapeHtml(item.name) : ""}</div>
          <div class="item-meta">${escapeHtml(item.maker || "メーカー不明")}${item.category ? " / " + escapeHtml(item.category) : ""}</div>
          <div class="item-meta">数量: ${item.qty || 1}</div>
          <div class="item-actions">
            <button class="btn-gray" onclick="window.changeQty('${escapeHtml(item.id)}', -1)">-1</button>
            <button class="btn-green" onclick="window.changeQty('${escapeHtml(item.id)}', 1)">+1</button>
            <button class="btn-red" onclick="window.removeCurrentItem('${escapeHtml(item.id)}')">削除</button>
          </div>
        </div>
      `;
    }
    els.currentList.innerHTML = html;
  }

  function renderSuggestions(){
    const freq = load(STORAGE_KEYS.freq, {});
    const entries = Object.entries(freq)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 12);

    if(!entries.length){
      els.suggestions.innerHTML = '<div class="small">まだ候補はありません。</div>';
      return;
    }

    els.suggestions.innerHTML = entries.map(([code, count]) =>
      `<span class="suggest-chip" onclick="window.pickSuggestion('${escapeHtml(code)}')">${escapeHtml(code)} (${count})</span>`
    ).join("");
  }

  function renderHistory(){
    const history = getHistory();
    els.historyCount.textContent = history.length + "件";

    if(!history.length){
      els.historyList.innerHTML = '<div class="small">保存履歴はありません。</div>';
      return;
    }

    let html = "";
    history.forEach(entry => {
      const itemLines = (entry.items || []).map(item => {
        const label = item.name ? item.code + " / " + item.name : item.code;
        return "・" + escapeHtml(label) + " × " + escapeHtml(item.qty || 1);
      }).join("<br>");

      html += `
        <div class="item">
          <div class="item-code">${escapeHtml(formatDate(entry.createdAt))}</div>
          <div class="item-meta">${escapeHtml(entry.companyName || "")}${entry.personName ? " / " + escapeHtml(entry.personName) : ""}</div>
          <div class="item-meta">${itemLines || "明細なし"}</div>
          <div class="item-actions">
            <button class="btn-blue" onclick="window.restoreHistory('${escapeHtml(entry.id)}')">復元</button>
            <button class="btn-red" onclick="window.deleteHistory('${escapeHtml(entry.id)}')">削除</button>
          </div>
        </div>
      `;
    });

    els.historyList.innerHTML = html;
  }

  async function ensureWorker(){
    if(worker) return worker;

    worker = await Tesseract.createWorker("eng");

    await worker.setParameters({
      tessedit_pageseg_mode: "7",
      tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_/.",
      preserve_interword_spaces: "1",
      user_defined_dpi: "400",
      tessedit_do_invert: "0"
    });

    return worker;
  }

  async function startCamera(){
    if(isStartingCamera) return;
    isStartingCamera = true;

    try{
      if(stream) stopCamera();

      const constraintsList = [
        {
          video: {
            facingMode: { exact: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            focusMode: "continuous",
            exposureMode: "continuous"
          },
          audio: false
        },
        {
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        },
        {
          video: true,
          audio: false
        }
      ];

      let lastError = null;

      for(const constraints of constraintsList){
        try{
          stream = await navigator.mediaDevices.getUserMedia(constraints);
          break;
        }catch(err){
          lastError = err;
        }
      }

      if(!stream){
        throw lastError || new Error("camera unavailable");
      }

      els.video.srcObject = stream;
      await els.video.play();

      const track = stream.getVideoTracks()[0];
      if(track && track.getCapabilities){
        const caps = track.getCapabilities();
        const advanced = {};

        if(caps.focusMode && caps.focusMode.includes("continuous")){
          advanced.focusMode = "continuous";
        }
        if(caps.exposureMode && caps.exposureMode.includes("continuous")){
          advanced.exposureMode = "continuous";
        }

        if(Object.keys(advanced).length){
          try{
            await track.applyConstraints({ advanced: [advanced] });
          }catch(e){}
        }
      }

      setStatus("カメラを起動しました", "success");
    }catch(e){
      setStatus("カメラを起動できませんでした", "error");
    }finally{
      isStartingCamera = false;
    }
  }

  function stopCamera(){
    if(stream){
      stream.getTracks().forEach(track => track.stop());
      stream = null;
    }
    els.video.srcObject = null;
    setStatus("カメラを停止しました");
  }

  function cropGuideImage(){
    const video = els.video;
    const guideEl = document.querySelector(".guide-box");

    if(!video.videoWidth || !video.videoHeight || !guideEl) return null;

    const videoRect = video.getBoundingClientRect();
    const guideRect = guideEl.getBoundingClientRect();

    const scaleX = video.videoWidth / videoRect.width;
    const scaleY = video.videoHeight / videoRect.height;

    const sx = Math.max(0, Math.floor((guideRect.left - videoRect.left) * scaleX));
    const sy = Math.max(0, Math.floor((guideRect.top - videoRect.top) * scaleY));
    const sw = Math.min(video.videoWidth - sx, Math.floor(guideRect.width * scaleX));
    const sh = Math.min(video.videoHeight - sy, Math.floor(guideRect.height * scaleY));

    const canvas = document.createElement("canvas");
    canvas.width = sw;
    canvas.height = sh;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

    return canvas;
  }

  function preprocess(canvas, mode){
    const out = document.createElement("canvas");
    out.width = canvas.width;
    out.height = canvas.height;

    const ctx = out.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(canvas, 0, 0);

    const img = ctx.getImageData(0, 0, out.width, out.height);
    const d = img.data;

    for(let i = 0; i < d.length; i += 4){
      let g = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
      g = (g - 128) * 2.8 + 128;
      g = g > 150 ? 255 : g < 100 ? 0 : g;
      g = Math.max(0, Math.min(255, g));

      d[i] = d[i + 1] = d[i + 2] = g;
    }

    ctx.putImageData(img, 0, 0);

    if(mode === "scale2x"){
      const scaled = document.createElement("canvas");
      scaled.width = out.width * 2;
      scaled.height = out.height * 2;
      const sctx = scaled.getContext("2d");
      sctx.imageSmoothingEnabled = false;
      sctx.drawImage(out, 0, 0, scaled.width, scaled.height);
      return scaled;
    }

    return out;
  }

  function extractCodesFromText(text){
    const raw = String(text || "").toUpperCase();
    const compact = raw
      .replace(/[|]/g, "I")
      .replace(/[Ｏ]/g, "O")
      .replace(/[０]/g, "0")
      .replace(/[１]/g, "1")
      .replace(/[５]/g, "5")
      .replace(/[Ｓ]/g, "S")
      .replace(/[Ｂ]/g, "B");

    const matches = compact.match(/[A-Z0-9][A-Z0-9\-_/.\s]{3,24}[A-Z0-9]/g) || [];
    const scoreMap = new Map();

    for(const m of matches){
      const code = normalizeCode(m);
      if(!code) continue;
      if(!/[A-Z]/.test(code) || !/\d/.test(code) || code.length < 4) continue;

      let weight = 10;
      if(code.length >= 6) weight += 10;
      if(code.length >= 8) weight += 8;
      if(getBestProductInfo(code)) weight += 30;
      if(/^[A-Z]{2,5}\d{3,}/.test(code)) weight += 18;
      if(/[-_/\.]/.test(code)) weight += 4;

      scoreMap.set(code, (scoreMap.get(code) || 0) + weight);
    }

    return [...scoreMap.entries()]
      .sort((a, b) => b[1] - a[1])
      .map(v => v[0])
      .slice(0, 8);
  }

  async function scanFromGuide(){
    if(isScanning) return;
    if(!stream){
      setStatus("先にカメラを起動してください", "error");
      return;
    }

    isScanning = true;
    setStatus("スキャン中...");

    try{
      const canvas = cropGuideImage();
      if(!canvas){
        setStatus("映像を取得できません", "error");
        return;
      }

      const preparedList = [
        preprocess(canvas, "scale2x"),
        preprocess(canvas, "normal"),
        canvas
      ];

      const w = await ensureWorker();
      let bestText = "";
      let bestConfidence = -1;

      for(const target of preparedList){
        const result = await w.recognize(target);
        const text = result && result.data ? result.data.text || "" : "";
        const conf = result && result.data ? Number(result.data.confidence || 0) : 0;

        if(conf > bestConfidence){
          bestConfidence = conf;
          bestText = text;
        }
      }

      const candidates = extractCodesFromText(bestText);
      currentScanCandidates = candidates;
      renderCandidates();

      if(candidates.length){
        renderLinks(candidates[0]);
        setStatus("候補を検出しました", "success");
      }else{
        renderLinks("");
        setStatus("候補を検出できませんでした", "error");
      }
    }catch(e){
      setStatus("スキャンに失敗しました", "error");
    }finally{
      isScanning = false;
    }
  }

  function clearHistoryAll(){
    saveHistory([]);
    renderHistory();
  }

  async function copyOrderText(){
    const text = els.orderPreview.textContent || "";
    try{
      await navigator.clipboard.writeText(text);
      setStatus("注文文をコピーしました", "success");
    }catch(e){
      setStatus("コピーできませんでした", "error");
    }
  }

  window.useScanCandidate = function(i){
    const code = currentScanCandidates[i];
    if(!code) return;
    addCurrentItem(code);
    updateOrderPreview();
    setStatus("候補を追加しました", "success");
  };

  window.removeScanCandidate = function(i){
    currentScanCandidates.splice(i, 1);
    renderCandidates();
  };

  window.changeQty = function(id, diff){
    changeQty(id, diff);
    updateOrderPreview();
  };

  window.removeCurrentItem = function(id){
    removeCurrentItem(id);
    updateOrderPreview();
  };

  window.pickSuggestion = function(code){
    addCurrentItem(code);
    updateOrderPreview();
    setStatus("候補を追加しました", "success");
  };

  window.restoreHistory = function(id){
    const history = getHistory();
    const entry = history.find(x => x.id === id);
    if(!entry) return;

    saveCurrent(entry.items || []);
    els.companyName.value = entry.companyName || "";
    els.personName.value = entry.personName || "";
    els.remarks.value = entry.remarks || "";
    renderCurrent();
    updateOrderPreview();
    setStatus("履歴を復元しました", "success");
  };

  window.deleteHistory = function(id){
    const history = getHistory().filter(x => x.id !== id);
    saveHistory(history);
    renderHistory();
    setStatus("履歴を削除しました", "success");
  };

  els.addManualBtn.addEventListener("click", () => {
    const code = normalizeCode(els.manual.value);
    if(!code){
      setStatus("品番を入力してください", "error");
      return;
    }
    addCurrentItem(code);
    els.manual.value = "";
    updateOrderPreview();
    setStatus("手入力を追加しました", "success");
  });

  els.manual.addEventListener("keydown", e => {
    if(e.key === "Enter"){
      e.preventDefault();
      els.addManualBtn.click();
    }
  });

  els.startBtn.addEventListener("click", startCamera);
  els.stopBtn.addEventListener("click", stopCamera);
  els.scanBtn.addEventListener("click", async () => {
    await scanFromGuide();
    updateOrderPreview();
  });

  els.buildOrderBtn.addEventListener("click", () => {
    updateOrderPreview();
    setStatus("注文文を作成しました", "success");
  });

  els.saveHistoryBtn.addEventListener("click", () => {
    updateOrderPreview();
    saveCurrentToHistory();
  });

  els.copyBtn.addEventListener("click", copyOrderText);
  els.printBtn.addEventListener("click", () => window.print());

  els.clearCurrentBtn.addEventListener("click", () => {
    clearCurrent();
    updateOrderPreview();
    setStatus("現在リストを削除しました", "success");
  });

  els.clearHistoryBtn.addEventListener("click", () => {
    clearHistoryAll();
    setStatus("履歴を削除しました", "success");
  });

  renderCurrent();
  renderSuggestions();
  renderHistory();
  updateOrderPreview();
})();
</script>
