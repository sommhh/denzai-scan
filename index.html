<script>

 else if(o.t==='trans'){var c=(d.cap||'').replace('kVA','');L.marker([d.lat,d.lng],{icon:L.divIcon({html:'<div class="marker-trans">'+c+'</div>',iconSize:[32,32],iconAnchor:[16,16]})}).on('click',function(){if(state.tool==='edit')editObj(o)}).addTo(o._g);var lb=[d.no,d.cap].filter(Boolean).join(' ');if(lb)L.marker([d.lat,d.lng],{icon:L.divIcon({html:'<div class="marker-label red">'+lb+'</div>'})}).on('click',function(){if(state.tool==='edit')editObj(o)}).addTo(o._g)}
 else if(o.t==='line'||o.t==='hikikomi'||o.t==='bunki'){var opt={color:o.t==='line'?'#0f172a':'#dc2626',weight:5};if(o.t==='bunki')opt.dashArray='8,10';L.polyline([[d.p1.lat,d.p1.lng],[d.p2.lat,d.p2.lng]],opt).on('click',function(){if(state.tool==='edit')editLen(o)}).addTo(o._g);var dist=d.dist||map.distance(d.p1,d.p2).toFixed(1);var mid=[(d.p1.lat+d.p2.lat)/2,(d.p1.lng+d.p2.lng)/2];L.marker(mid,{icon:L.divIcon({html:'<div class="marker-label red">'+dist+'m</div>'})}).on('click',function(){if(state.tool==='edit')editLen(o)}).addTo(o._g)}
 else if(o.t==='bld'||o.t==='bldf'){L.polygon(d.ps.map(function(p){return[p.lat,p.lng]}),{color:o.t==='bldf'?'#2563eb':'#dc2626',weight:3,fillOpacity:.12}).addTo(o._g)}
 else if(o.t==='text'){L.marker([d.lat,d.lng],{icon:L.divIcon({html:'<div class="text-lab">'+d.text+'</div>'})}).on('click',function(){if(state.tool==='edit')editTxt(o)}).addTo(o._g)}
}
async function editObj(o){if(state.tool!=='edit')return;push();if(o.t==='pole'){var r=await showModal('電柱編集','<label>柱番号<input id="no" value="'+(o.d.no||'')+'"></label>');if(r){o.d.no=r.no;render(o);saveSoon()}}else if(o.t==='trans'){var caps=['','5kVA','10kVA','15kVA','20kVA','25kVA','30kVA','40kVA','50kVA','60kVA','75kVA'];var r=await showModal('トランス編集','<label>柱番号<input id="no" value="'+(o.d.no||'')+'"></label><label>容量<select id="cap">'+caps.map(function(v){return'<option '+(o.d.cap===v?'selected':'')+'>'+v+'</option>'}).join('')+'</select></label>');if(r){o.d.no=r.no;o.d.cap=r.cap;render(o);saveSoon()}}}
async function editLen(o){if(state.tool!=='edit')return;push();var cur=o.d.dist||map.distance(o.d.p1,o.d.p2).toFixed(1);var r=await showModal('長さ修正','<label>距離(m)<input id="dist" type="number" step="0.1" value="'+cur+'"></label>');if(r&&r.dist){o.d.dist=parseFloat(r.dist).toFixed(1);render(o);saveSoon()}}
async function editTxt(o){if(state.tool!=='edit')return;push();var r=await showModal('文字修正','<label>文字<input id="text" value="'+o.d.text+'"></label>');if(r&&r.text){o.d.text=r.text;render(o);saveSoon()}}

map.on('click',async function(e){if(modal.className.indexOf('show')>-1)return;if(!state.tool||state.tool==='edit')return;var now=Date.now();if(now-state.last<80)return;state.last=now;var ll=e.latlng;
 if(state.tool==='pole'){var r=await showModal('電柱追加','<label>柱番号<input id="no" value="'+($('hikikomi_basho').value||'')+'" placeholder="名取12"></label>');if(r)add('pole',{lat:ll.lat,lng:ll.lng,no:r.no})}
 else if(state.tool==='trans'){var r=await showModal('トランス追加','<label>柱番号<input id="no" value="'+($('trans_basho').value||'')+'"></label><label>容量<select id="cap"><option></option><option>5kVA</option><option>10kVA</option><option>15kVA</option><option>20kVA</option><option>25kVA</option><option>30kVA</option><option>40kVA</option><option>50kVA</option><option>60kVA</option><option>75kVA</option></select></label>');if(r)add('trans',{lat:ll.lat,lng:ll.lng,no:r.no,cap:r.cap})}
 else if(state.tool==='line'||state.tool==='hikikomi'||state.tool==='bunki'){state.tmp.push(ll);if(state.tmp.length===2){var p1=state.tmp[0],p2=state.tmp[1];add(state.tool,{p1:{lat:p1.lat,lng:p1.lng},p2:{lat:p2.lat,lng:p2.lng},dist:map.distance(p1,p2).toFixed(1)});state.tmp=[];show('追加')}else show('終点をタップ')}
 else if(state.tool==='bld'){state.tmp.push(ll);if(state.tmp.length===2){var a=state.tmp[0],b=state.tmp[1];add('bld',{ps:[{lat:a.lat,lng:a.lng},{lat:a.lat,lng:b.lng},{lat:b.lat,lng:b.lng},{lat:b.lat,lng:a.lng}]});state.tmp=[]}else show('対角をタップ')}
 else if(state.tool==='bldf'){state.tmp.push(ll);layerGroup.eachLayer(function(l){if(l._prev)layerGroup.removeLayer(l)});if(state.tmp.length>1){var pl=L.polyline(state.tmp,{color:'#2563eb',weight:3,dashArray:'5,5',opacity:.7}).addTo(layerGroup);pl._prev=true}show(state.tmp.length+'点');document.querySelector('[data-t="bldf"]').className='ready'}
 else if(state.tool==='text'){var r=await showModal('文字追加','<label>文字<input id="text" placeholder="分電盤"></label>');if(r&&r.text)add('text',{lat:ll.lat,lng:ll.lng,text:r.text})}
});

document.querySelectorAll('#tools button').forEach(function(b){b.onclick=function(){var t=b.getAttribute('data-t');if(t==='bldf'&&state.tool==='bldf'&&state.tmp.length>=3){add('bldf',{ps:state.tmp.map(function(p){return{lat:p.lat,lng:p.lng}})});state.tmp=[];layerGroup.eachLayer(function(l){if(l._prev)layerGroup.removeLayer(l)});b.className='';show('自由形状確定');return}if(state.tool!==t&&state.tmp.length){state.tmp=[];layerGroup.eachLayer(function(l){if(l._prev)layerGroup.removeLayer(l)});document.querySelector('[data-t="bldf"]').className=''}state.tool=state.tool===t?null:t;document.querySelectorAll('#tools button').forEach(function(x){x.className=''});if(state.tool){b.className='on';mapEl.className='paint';show(b.querySelector('span').textContent+'モード')}else{mapEl.className='';show('解除')}}});

function getR(n){var e=document.querySelector('input[name="'+n+'"]:checked');return e?e.value:''}
function setR(n,v){document.querySelectorAll('input[name="'+n+'"]').forEach(function(e){e.checked=false});if(v){var e=document.querySelector('input[name="'+n+'"][value="'+v+'"]');if(e)e.checked=true}}

// GPS with 詳細住所
$('gps').onclick=function(){
  if(!navigator.geolocation){show('GPS非対応');return}
  addrstat.textContent='取得中...';show('GPS取得中');
  navigator.geolocation.getCurrentPosition(async function(p){
    var lat=p.coords.latitude,lng=p.coords.longitude;
    map.setView([lat,lng],19);gpsLayer.clearLayers();
    L.marker([lat,lng],{icon:L.divIcon({html:'<div style="width:22px;height:22px;border-radius:50%;background:#2563eb;border:3px solid #fff;box-shadow:0 0 0 6px rgba(37,99,235,.25)"></div>'})}).addTo(gpsLayer).bindPopup('現在地').openPopup();
    $('jusho').value=lat.toFixed(6)+','+lng.toFixed(6);
    
    // 詳細住所取得
    try{
      // Nominatim 日本語 詳細
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=ja`,{headers:{'User-Agent':'DenryokuApp'}});
      const data = await res.json();
      if(data && data.address){
        const a=data.address;
        let addr='';
        // 宮城県名取市増田○丁目○-○ 形式
        if(a.state) addr+=a.state;
        if(a.city) addr+=a.city;
        else if(a.town) addr+=a.town;
        else if(a.village) addr+=a.village;
        if(a.suburb) addr+=a.suburb;
        if(a.quarter) addr+=a.quarter;
        if(a.neighbourhood) addr+=a.neighbourhood;
        if(a.city_district) addr+=a.city_district;
        // 丁目
        if(a.suburb && !addr.includes('丁目') && data.display_name.includes('丁目')){
          const m = data.display_name.match(/([^\s]+丁目)/);
          if(m && !addr.includes(m[1])) addr+=m[1];
        }
        if(a.road) addr+=a.road;
        if(a.house_number) addr+=a.house_number;
        
        if(addr.length>4){
          $('jusho').value=addr;
          addrstat.textContent='✓';
          show('住所: '+addr);
          return;
        }
      }
      // フォールバック: 県市まで
      const res2 = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=14&accept-language=ja`);
      const d2 = await res2.json();
      if(d2.address){
        const city=(d2.address.state||'')+(d2.address.city||d2.address.town||'');
        if(city){$('jusho').value=city+'付近';addrstat.textContent='市';show(city)}
      }
    }catch(e){addrstat.textContent='失敗';console.log(e)}
  },function(){show('GPS失敗');addrstat.textContent='';},{enableHighAccuracy:true,timeout:15000});
};

function saveSoon(){clearTimeout(window._ts);window._ts=setTimeout(doSave,700)}
function doSave(){try{var c=map.getCenter();var d={v:'40.8',f:{genba:$('genba').value,jusho:$('jusho').value,koji:getR('k'),kyokyu:$('kyokyu').value,keiyaku:$('keiyaku').value,amp:$('amp').value,dv:$('dv').value,sz:$('sz').value,hikikomi_basho:$('hikikomi_basho').value,trans_basho:$('trans_basho').value,trans_cap1:$('trans_cap1').value,trans_cap2:$('trans_cap2').value,mbox:getR('m'),hk:['h1','h2','h3'].filter(function(id){return $(id).checked}),eq:['e1','e2','e3','e4','e5','e6'].filter(function(id){return $(id).checked}),juten:$('juten').value,kensa:$('kensa').value,biko:$('biko').value},o:state.objs.map(function(o){return{t:o.t,d:o.d,id:o.id}}),c:{lat:c.lat,lng:c.lng},z:map.getZoom()};localStorage.setItem('dq40',JSON.stringify(d));show('保存')}catch(e){}}
function load(){try{var s=localStorage.getItem('dq40');if(!s){show('データなし');return}var d=JSON.parse(s),f=d.f||{};['genba','jusho','kyokyu','keiyaku','amp','dv','sz','hikikomi_basho','trans_basho','trans_cap1','trans_cap2','juten','kensa','biko'].forEach(function(k){if($(k))$(k).value=f[k]||''});setR('k',f.koji||'本設');setR('m',f.mbox||'ベージュ');['h1','h2','h3'].forEach(function(id){if($(id))$(id).checked=(f.hk||[]).indexOf(id)>-1});['e1','e2','e3','e4','e5','e6'].forEach(function(id){if($(id))$(id).checked=(f.eq||[]).indexOf(id)>-1});upd();if(d.c)map.setView([d.c.lat,d.c.lng],d.z||18);layerGroup.clearLayers();state.objs=[];state.undo=[];(d.o||[]).forEach(function(o){var no={t:o.t,d:o.d,id:o.id};state.objs.push(no);render(no)});push();show('読込完了')}catch(e){show('読込失敗')}}
$('save').onclick=doSave;$('load').onclick=load;
$('undo').onclick=function(){if(state.undo.length<2){show('戻せません');return}state.undo.pop();var p=JSON.parse(state.undo[state.undo.length-1]||'[]');layerGroup.clearLayers();state.objs=[];p.forEach(function(o){var no={t:o.t,d:o.d,id:o.id};state.objs.push(no);render(no)});saveSoon();show('戻しました')};
$('clear').onclick=function(){if(confirm('全削除しますか？')){push();layerGroup.clearLayers();state.objs=[];state.tmp=[];push();saveSoon();show('全削除')}};
$('share').onclick=async function(){doSave();try{if(navigator.share){await navigator.share({title:$('genba').value||'電力申請',text:$('jusho').value})}else{await navigator.clipboard.writeText(localStorage.getItem('dq40'));show('コピーしました')}}catch(e){}};

document.querySelectorAll('input,select,textarea').forEach(function(e){e.addEventListener('input',saveSoon)});
setInterval(doSave,60000);

log('起動完了');
setTimeout(function(){boot.className='hide';document.getElementById('app').className='app ready';map.invalidateSize();load();upd();if(!localStorage.getItem('dq40'))show('地図をタップして作図')},500);

}catch(err){
  log('エラー: '+err.message);
  boot.innerHTML='<div style="padding:30px;text-align:center"><div style="font-size:32px">⚠️</div><div style="margin:15px 0">起動失敗</div><div style="font-size:12px;opacity:.8">'+err.message+'</div><button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:#fff;color:#1e3a8a;border:none;border-radius:10px;font-weight:700">再読み込み</button></div>';
}
}();
</script>
