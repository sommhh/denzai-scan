<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>型番爆速検索</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f8f9fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.container{
  width:90%;
  max-width:400px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:10px 0;
  font-size:16px;
}
.btn{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  font-size:16px;
}
.lens{background:#000;}
.manual{background:#4285f4;}
.spec{background:#34a853;}
</style>
</head>

<body>

<div class="container">

<h2>📄 型番爆速検索</h2>

<a class="btn lens" href="https://lens.google.com/" target="_blank">
📷 Googleレンズ
</a>

<input id="modelInput" placeholder="型番を入力 or ペースト">

<button class="btn manual" onclick="pasteAndSearch()">📋 貼り付け検索</button>
<button class="btn manual" onclick="searchNow('取扱説明書')">📖 取説</button>
<button class="btn spec" onclick="searchNow('仕様書')">📑 仕様書</button>

</div>

<script>

// 🔥 クリップボード → 即検索（ユーザー操作トリガー）
async function pasteAndSearch(){
  try{
    const text = await navigator.clipboard.readText();

    if(!text){
      alert("コピーされてません");
      return;
    }

    const clean = text.trim();

    document.getElementById("modelInput").value = clean;

    autoSearch(clean);

  }catch(e){
    alert("iPhoneは長押し→ペーストしてください");
  }
}


// 🔍 自動検索
function autoSearch(keyword){
  if(!keyword) return;

  const q = encodeURIComponent(
    `${keyword} ("仕様書" OR "取扱説明書") filetype:pdf -amazon -楽天`
  );

  location.href = `https://www.google.com/search?q=${q}`;
}


// 🔍 手動検索
function searchNow(type){
  const keyword = document.getElementById("modelInput").value.trim();

  if(!keyword){
    alert("型番を入力してください");
    return;
  }

  const q = encodeURIComponent(
    `${keyword} "${type}" filetype:pdf -amazon -楽天`
  );

  location.href = `https://www.google.com/search?q=${q}`;
}

</script>

</body>
</html>
