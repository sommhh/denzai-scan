  var firstInteractionSent = false;
  var errorSent = false;

              window.webkit.messageHandlers &&

              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  }

      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

      } catch (e) { /* ignore */ }

  function onFrame() {

    frameCount++;

        frame_count: frameCount,
        detected_at: Date.now()

    originalRAF.call(window, onFrame);

      if (!gameReadySent) {

            gameReadySent = true;

              frame_count: frameCount,

      return originalRAF.call(window, callback);

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:#f8fafc}
button,input,select,textarea{font-family:inherit;font-size:16px;outline:none}
#boot{position:fixed;inset:0;background:#1e3a8a;color:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column}
#boot.hide{display:none}
.app{width:100vw;height:100vh;height:100dvh;display:flex;position:relative}
.sidebar{width:360px;flex-shrink:0;background:#fff;display:flex;flex-direction:column;box-shadow:2px 0 12px rgba(0,0,0,.1);z-index:1000;position:relative}
.sidebar.hidden{margin-left:-360px}
@media(max-width:900px){.sidebar{width:100%;max-width:420px}}
@media(max-width:768px){.sidebar{position:absolute;left:0;top:0;bottom:0;width:90%;max-width:340px;transform:translateX(0);transition:transform .3s}.sidebar.hidden{transform:translateX(-100%);margin-left:0}}
.head{background:#1e3a8a;color:#fff;padding:12px}
.head h1{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.tg{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:6px}
.btns{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.btns button{height:34px;background:#fff;color:#1e3a8a;border:none;border-radius:8px;font-size:11px;font-weight:600}
.form{flex:1;overflow-y:auto;padding:12px;background:#f8fafc}
.f{margin-bottom:10px}
.f label{display:block;font-size:11px;font-weight:700;margin-bottom:4px;color:#374151}
.f input,.f select,.f textarea{width:100%;padding:9px;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-size:15px}
.f textarea{height:50px}
.r{display:flex;gap:6px;flex-wrap:wrap}
.r label{display:flex;align-items:center;gap:4px;padding:5px 8px;background:#fff;border:1px solid #d1d5db;border-radius:6px;font-size:13px}
.r label.on{background:#dbeafe;border-color:#2563eb;color:#1e3a8a;font-weight:600}
.chk{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.chk label{display:flex;align-items:center;gap:5px;padding:7px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;font-size:12px}
.chk label.on{background:#dbeafe;border-color:#2563eb}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mapwrap{flex:1;position:relative;background:#ddd;min-width:0}
#map{position:absolute;inset:0}
.tools{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:#fff;padding:5px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.2);display:flex;gap:4px;z-index:500;max-width:95vw;overflow:auto}
.tools button{height:48px;min-width:54px;border:1px solid #e5e7eb;background:#f9fafb;border-radius:8px;font-size:10px;font-weight:600;white-space:nowrap}
.tools button.on{background:#2563eb;color:#fff;border-color:#2563eb}
.hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;z-index:600;opacity:0;transition:.2s;pointer-events:none}
.hint.show{opacity:1}
.fab{position:absolute;top:12px;right:12px;left:auto;width:40px;height:40px;border-radius:8px;background:#1e3a8a;color:#fff;border:none;font-size:18px;z-index:700;display:none;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.3)}
@media(max-width:768px){.fab{display:flex}}
.sidebar:not(.hidden)~.mapwrap .fab{display:none}
.openfab{display:none}
.sidebar.hidden~.mapwrap .openfab{display:flex}

.pole-label{background:transparent;border:none;box-shadow:none;font-size:11px;font-weight:700;color:#000;text-shadow:0 0 2px #fff}
.leaflet-tooltip-top:before{border-top-color:transparent}
.leaflet-top.leaflet-right{top:60px;right:10px}
.leaflet-control-zoom{box-shadow:0 2px 6px rgba(0,0,0,.3)}
</style>

<body>
<div id="boot"><div style="font-size:36px">⚡</div><div style="margin-top:10px">起動中...</div></div>
<div class="app">
  <div class="sidebar" id="sb">
    <div class="head">
      <h1>電力申請 v40.9 <button class="tg" id="closeBtn">✕</button></h1>
      <div class="btns">
        <button id="gps">📍GPS</button>
        <button id="save">💾保存</button>
        <button id="load">📂読込</button>
        <button id="undo">↩️戻</button>
        <button id="clear">🗑️消</button>
        <button id="share">📤共有</button>
      </div>
    </div>
    <div class="form">
      <div class="f"><label>現場名</label><input id="genba" placeholder="〇〇邸"></div>
      <div class="f"><label>住所 <span id="addrstat" style="color:#2563eb;font-size:10px"></span></label><input id="jusho" placeholder="宮城県名取市..."></div>
      <div class="f"><label>工事種別</label><div class="r"><label><input type="radio" name="k" value="本設" checked>本設</label><label><input type="radio" name="k" value="仮設">仮設</label></div></div>
      <div class="f"><label>供給方式</label><select id="kyokyu"><option>単相2線式 100V</option><option selected>単相3線式 100V/200V</option><option>三相3線式 200V</option></select></div>
      <div class="grid2">
        <div class="f"><label>契約種別</label><select id="keiyaku"><option>従量電灯B</option><option>従量電灯C</option><option>低圧電力</option></select></div>
        <div class="f"><label>契約容量</label><select id="amp"><option value="">選択</option><option>15A</option><option>20A</option><option>30A</option><option>40A</option><option>50A</option><option>60A</option><option>6kVA</option><option>8kVA</option><option>10kVA</option><option>12kVA</option><option>15kVA</option></select></div>
      </div>
      <div class="f"><label>引込線</label><div class="grid2"><select id="dv"><option>DV2線</option><option selected>DV3線</option></select><select id="sz"><option>3.2mm</option><option>14mm²</option><option>22mm²</option><option>38mm²</option><option>60mm²</option></select></div></div>
      <div class="grid2">
        <div class="f"><label>引込柱番号</label><input id="hikikomi_basho" placeholder="名取12"></div>
        <div class="f"><label>トランス柱番号</label><input id="trans_basho" placeholder="名取15"></div>
      </div>
      <div class="grid2">
        <div class="f"><label>トランス1</label><select id="trans_cap1"><option value="">-</option><option>5kVA</option><option>10kVA</option><option>15kVA</option><option>20kVA</option><option>25kVA</option><option>30kVA</option><option>40kVA</option><option>50kVA</option><option>60kVA</option><option>75kVA</option></select></div>
        <div class="f"><label>トランス2</label><select id="trans_cap2"><option value="">-</option><option>5kVA</option><option>10kVA</option><option>15kVA</option><option>20kVA</option><option>25kVA</option><option>30kVA</option><option>40kVA</option><option>50kVA</option><option>60kVA</option><option>75kVA</option></select></div>
      </div>
      <div class="f"><label>区分</label><div class="r"><label><input type="checkbox" id="h1">二類</label><label><input type="checkbox" id="h2">三類</label><label><input type="checkbox" id="h3">空中分岐</label></div></div>
      <div class="f"><label>メーター</label><div class="r"><label><input type="radio" name="m" value="ベージュ" checked>ベージュ</label><label><input type="radio" name="m" value="グレー">グレー</label><label><input type="radio" name="m" value="なし">なし</label></div></div>
      <div class="f"><label>設備</label><div class="chk"><label><input type="checkbox" id="e1">☀️太陽光</label><label><input type="checkbox" id="e2">♨️エコキュート</label><label><input type="checkbox" id="e3">🍳IH</label><label><input type="checkbox" id="e4">🚗EV</label><label><input type="checkbox" id="e5">🔋蓄電池</label><label><input type="checkbox" id="e6">🏠オール電化</label></div></div>
      <div class="grid2"><div class="f"><label>受点予定</label><input id="juten" type="date"></div><div class="f"><label>検査日</label><input id="kensa" type="date"></div></div>
      <div class="f"><label>備考</label><textarea id="biko" rows="2"></textarea></div>
    </div>
  </div>
  <div class="mapwrap">
    <button class="fab openfab" id="openBtn">☰</button>
    <div id="map"></div>
    <div class="tools">
      <button data-t="pole">電柱</button>
      <button data-t="trans">トランス</button>
      <button data-t="line">低圧</button>
      <button data-t="hikikomi">引込</button>
      <button data-t="bunki">分岐</button>
      <button data-t="bld">建物</button>
      <button data-t="bldf">自由</button>
      <button data-t="text">文字</button>
      <button data-t="edit">編集</button>
    </div>
    <div class="hint" id="hint"></div>
  </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
var boot=document.getElementById('boot');
setTimeout(function(){boot.classList.add('hide')},400);

var $=function(id){return document.getElementById(id)};
var sb=$('sb'), hint=$('hint'), addrstat=$('addrstat');
function show(t){hint.textContent=t;hint.classList.add('show');setTimeout(function(){hint.classList.remove('show')},1800)}

// サイドバー
$('closeBtn').onclick=function(){sb.classList.add('hidden');setTimeout(function(){map.invalidateSize()},300)};
$('openBtn').onclick=function(){sb.classList.remove('hidden');setTimeout(function(){map.invalidateSize()},300)};

function upd(){document.querySelectorAll('.r label,.chk label').forEach(function(l){var i=l.querySelector('input');l.className=i&&i.checked?'on':''})}
document.addEventListener('change',upd);

// 地図
var map = L.map('map',{doubleClickZoom:false, zoomControl:false}).setView([38.172,140.882],16);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'©OSM'}).addTo(map);
var layer=L.layerGroup().addTo(map);
var historyStack=[];
function pushHist(l){historyStack.push(l)}
setTimeout(function(){map.invalidateSize()},500);
window.addEventListener('resize',function(){map.invalidateSize()});

var tool=null, tmp=[], tempLine=null, polyPoints=[], editMode=false;
var labelCounter=1;

document.querySelectorAll('.tools button').forEach(function(b){
  b.onclick=function(){
    var t=b.dataset.t;
    if(tool==='bldf' && polyPoints.length){finishPoly()}
    tool=tool===t?null:t;
    document.querySelectorAll('.tools button').forEach(function(x){x.classList.remove('on')});
    if(tool){b.classList.add('on');show(t)} 
    tmp=[]; 
    if(tempLine){map.removeLayer(tempLine);tempLine=null}
    toggleEdit(tool==='edit');
  }
});

function addToLayer(l){l.addTo(layer);pushHist(l);return l}

function finishPoly(){
  if(polyPoints.length>=3){
    addToLayer(L.polygon(polyPoints,{color:'#2563eb',weight:2,fillOpacity:.1}));
    show('自由建物完了')
  }
  polyPoints=[];
  if(tempLine){map.removeLayer(tempLine);tempLine=null}
}

function makeEditableLabel(latlng, text, isPole){
  var id='lbl'+Date.now();
  var html='<div id="'+id+'" contenteditable="true" style="background:#fff;border:1px solid #000;padding:2px 5px;font-size:12px;min-width:30px;text-align:center;white-space:nowrap;cursor:text">'+text+'</div>';
  var icon = L.divIcon({html:html,className:'',iconSize:null});
  var m = L.marker(latlng,{icon:icon,draggable:true});
  m.isLabel=true;
  m.poleRef=isPole||null;
  addToLayer(m);
  setTimeout(function(){
    var el=document.getElementById(id);
    if(el){el.focus();document.execCommand('selectAll',false,null)}
  },50);
  return m;
}

map.on('click',function(e){
  if(!tool || editMode) return;
  var ll=e.latlng;
  if(tool==='pole'){
    var n=$('hikikomi_basho').value||('P'+labelCounter++);
    var m = L.circleMarker(ll,{radius:6,color:'#000',fillColor:'#fff',fillOpacity:1,weight:2});
    m.bindTooltip(n,{permanent:true,direction:'top',offset:[0,-8],className:'pole-label'});
    m.poleName=n;
    addToLayer(m);
    // ラベルを少しずらして配置（重ならないよう）
    var labelPos = L.latLng(ll.lat+0.00005, ll.lng);
    makeEditableLabel(labelPos, n, m);
    show('電柱:'+n);
  }
  else if(tool==='trans'){
    addToLayer(L.circleMarker(ll,{radius:7,color:'red',fillColor:'#fff',fillOpacity:1,weight:2}));
  }
  else if(tool==='line'||tool==='hikikomi'||tool==='bunki'){
    tmp.push(ll);
    if(tmp.length===2){
      var line = L.polyline(tmp,{color:tool==='line'?'#000':'red',weight:4});
      addToLayer(line);
      // 引込線の長さ表示
      if(tool==='hikikomi'){
        var dist = map.distance(tmp[0],tmp[1]);
        var mid = L.latLng((tmp[0].lat+tmp[1].lat)/2,(tmp[0].lng+tmp[1].lng)/2);
        var lenText = dist.toFixed(1)+'m';
        makeEditableLabel(mid, lenText, null);
      }
      tmp=[];
    }
  }
  else if(tool==='bld'){
    tmp.push(ll);
    if(tmp.length===2){
      addToLayer(L.rectangle([tmp[0],tmp[1]],{color:'#2563eb',weight:2,fillOpacity:.1}));
      tmp=[];
    }
  }
  else if(tool==='bldf'){
    polyPoints.push(ll);
    if(tempLine) map.removeLayer(tempLine);
    tempLine = L.polyline(polyPoints.concat([polyPoints[0]]),{color:'#2563eb',weight:2,dashArray:'4'}).addTo(map);
  }
  else if(tool==='text'){
    makeEditableLabel(ll, 'テキスト', null);
  }
});

map.on('dblclick',function(e){
  if(tool==='bldf'){finishPoly()}
});

map.on('mousemove',function(e){
  if(tool==='bldf' && polyPoints.length){
    var pts = polyPoints.concat([e.latlng]);
    if(tempLine) map.removeLayer(tempLine);
    tempLine = L.polyline(pts,{color:'#2563eb',weight:2,dashArray:'4'}).addTo(map);
  }
});

function toggleEdit(on){
  editMode=on;
  layer.eachLayer(function(l){
    if(l.dragging){
      on ? l.dragging.enable() : l.dragging.disable();
    }
    // 編集モードでは削除しない、移動のみ
    l.off('click');
    if(on && l.isLabel){
      l.on('click',function(ev){ev.originalEvent.stopPropagation()});
    }
  });
  map.getContainer().style.cursor = on ? 'move' : '';
  if(on) show('編集:ドラッグで移動');
}

// GPS - 強化版
$('gps').onclick=function(){
  if(!navigator.geolocation){show('GPS非対応');addrstat.textContent='×';return}
  if(!window.isSecureContext){show('HTTPSで開いてください');addrstat.textContent='×';return}
  
  addrstat.textContent='取得中';show('GPS取得中...');
  
  // 権限チェック
  if(navigator.permissions){
    navigator.permissions.query({name:'geolocation'}).then(function(res){
      if(res.state==='denied'){show('位置情報が拒否されています');addrstat.textContent='×'}
    });
  }
  
  var opts={enableHighAccuracy:true,timeout:25000,maximumAge:0};
  
  navigator.geolocation.getCurrentPosition(function(p){
    var lat=p.coords.latitude,lng=p.coords.longitude,acc=Math.round(p.coords.accuracy);
    map.setView([lat,lng],19);
    var m = L.marker([lat,lng]).bindPopup('現在地 ±'+acc+'m').addTo(layer);
    pushHist(m);
    m.openPopup();
    $('jusho').value=lat.toFixed(6)+','+lng.toFixed(6);
    addrstat.textContent='✓'+acc+'m';
    show('GPS成功 ±'+acc+'m');
    
    // 住所逆ジオ
    fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&zoom=18&accept-language=ja')
      .then(r=>r.json())
      .then(d=>{if(d.display_name){$('jusho').value=d.display_name}})
      .catch(()=>{});
      
  },function(err){
    var msg='';
    if(err.code===1)msg='権限を許可してください';
    else if(err.code===2)msg='電波弱い・屋内';
    else if(err.code===3)msg='タイムアウト';
    else msg=err.message;
    show('GPS失敗:'+msg);addrstat.textContent='×';
    
    // フォールバック: IP位置
    fetch('https://ipapi.co/json/')
      .then(r=>r.json())
      .then(d=>{
        if(d.latitude){
          map.setView([d.latitude,d.longitude],14);
          show('IP概算位置を表示');
          $('jusho').value=(d.city||'')+(d.region||'');
        }
      }).catch(()=>{});
      
  },opts);
};

// 保存読込
function getR(n){var e=document.querySelector('input[name="'+n+'"]:checked');return e?e.value:''}
function setR(n,v){document.querySelectorAll('input[name="'+n+'"]').forEach(function(e){e.checked=e.value===v});upd()}
$('save').onclick=function(){try{var d={genba:$('genba').value,jusho:$('jusho').value,koji:getR('k'),kyokyu:$('kyokyu').value,keiyaku:$('keiyaku').value,amp:$('amp').value};localStorage.setItem('dq',JSON.stringify(d));show('保存')}catch(e){show('保存失敗')}};
$('load').onclick=function(){try{var d=JSON.parse(localStorage.getItem('dq')||'{}');$('genba').value=d.genba||'';$('jusho').value=d.jusho||'';if(d.koji)setR('k',d.koji);$('kyokyu').value=d.kyokyu||'';$('keiyaku').value=d.keiyaku||'';$('amp').value=d.amp||'';upd();show('読込')}catch(e){show('読込失敗')}};
$('clear').onclick=function(){layer.clearLayers();historyStack=[];show('クリア')};
$('undo').onclick=function(){var l=historyStack.pop();if(l){layer.removeLayer(l);show('戻す')}else{show('履歴なし')}};
$('share').onclick=function(){if(navigator.share){navigator.share({title:$('genba').value||'電力申請',text:$('jusho').value||''})}else{show('共有不可')}};

upd();
show('準備OK');
})();
</script>
</body>
</html>
