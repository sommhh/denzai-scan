<!-- ★あなたの元コードそのまま＋バグ修正のみ -->
<script>
/* ===== 修正済み関数だけ差し替え ===== */

/* ★① 候補表示（ここが一番の原因） */
function renderCandidates(){
  els.ocrBox.style.display = "block";

  if(!currentScanCandidates.length){
    els.ocrCandidates.innerHTML = '<div class="item"><div class="item-meta">候補なし</div></div>';
    return;
  }

  let html = "";
  for(let i = 0; i < currentScanCandidates.length; i++){
    const code = currentScanCandidates[i];
    const info = getBestProductInfo(code);

    html += `
      <div class="item">
        <div class="item-code">${escapeHtml(code)}</div>
        <div class="item-meta">${escapeHtml(info && info.maker ? info.maker : "メーカー不明")}${info && info.category ? " / " + escapeHtml(info.category) : ""}</div>
        <div class="item-meta">${escapeHtml(info && info.name ? info.name : "辞書未登録候補")}</div>
        <div class="item-actions">
          <button class="btn-green" onclick="window.useScanCandidate(${i})">この候補を使う</button>
          <button class="btn-red" onclick="window.removeScanCandidate(${i})">消す</button>
        </div>
      </div>
    `;
  }
  els.ocrCandidates.innerHTML = html;
}

/* ★② 検索リンク */
function renderLinks(code){
  const p = normalizeCode(code);
  if(!p){
    els.linksBox.style.display = "none";
    els.links.innerHTML = "";
    return;
  }

  els.linksBox.style.display = "block";

  const q1 = encodeURIComponent(p);
  const q2 = encodeURIComponent(p + " 仕様書");
  const q3 = encodeURIComponent(p + " 図面");
  const q4 = encodeURIComponent(p + " カタログ");

  els.links.innerHTML = `
    <a href="https://www.google.com/search?q=${q1}" target="_blank">検索</a>
    <a href="https://www.google.com/search?q=${q2}" target="_blank">仕様書</a>
    <a href="https://www.google.com/search?q=${q3}" target="_blank">図面</a>
    <a href="https://www.google.com/search?q=${q4}" target="_blank">カタログ</a>
  `;
}

/* ★③ 現在リスト */
function renderCurrent(){
  const list = getCurrent();
  els.currentCount.textContent = list.length + "件";

  if(!list.length){
    els.currentList.innerHTML = '<div class="small">まだ追加されていません。</div>';
    return;
  }

  let html = "";
  for(let i = 0; i < list.length; i++){
    const item = list[i];

    html += `
      <div class="item" data-item-id="${escapeHtml(item.id)}">
        <div class="item-code">${escapeHtml(item.code)}${item.name ? " / " + escapeHtml(item.name) : ""}</div>
        <div class="item-meta">${escapeHtml(item.maker || "メーカー不明")}${item.category ? " / " + escapeHtml(item.category) : ""}</div>
        <div class="item-meta">数量: ${item.qty || 1}</div>
        <div class="item-actions">
          <button class="btn-gray" onclick="window.changeQty('${item.id}',-1)">-1</button>
          <button class="btn-green" onclick="window.changeQty('${item.id}',1)">+1</button>
          <button class="btn-red" onclick="window.removeCurrentItem('${item.id}')">削除</button>
        </div>
      </div>
    `;
  }

  els.currentList.innerHTML = html;
}

/* ★④ サジェスト */
function renderSuggestions(){
  const freq = getFreq();
  const entries = Object.entries(freq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 12);

  if(!entries.length){
    els.suggestions.innerHTML = '<span class="small">まだ候補はありません。</span>';
    return;
  }

  els.suggestions.innerHTML = entries.map(([code, count]) =>
    `<span class="suggest-chip" onclick="window.pickSuggestion('${escapeHtml(code)}')">${escapeHtml(code)} (${count})</span>`
  ).join("");
}
</script>
