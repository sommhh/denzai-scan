<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>電材スキャンPRO 改良版</title>
<meta name="theme-color" content="#101418">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --bg:#101418;
  --card:#1b2229;
  --card2:#24303a;
  --text:#fff;
  --muted:#b0bec5;
  --green:#00c853;
  --blue:#2962ff;
  --red:#d50000;
  --line:#06c755;
  --gray:#546e7a;
  --border:#31414d;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
}
.wrap{
  max-width:920px;
  margin:auto;
  padding:12px;
}
h1{
  margin:8px 0 14px;
  font-size:22px;
  text-align:center;
}
.card{
  background:var(--card);
  border-radius:14px;
  padding:12px;
  margin:10px 0;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
.title{
  font-size:18px;
  font-weight:700;
  margin-bottom:10px;
}
.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.col{
  flex:1 1 220px;
}
input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f151a;
  color:#fff;
  font-size:16px;
  outline:none;
}
textarea{
  min-height:90px;
  resize:vertical;
}
button, .btn{
  width:100%;
  padding:13px 12px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  text-align:center;
}
button:active, .btn:active{
  transform:scale(0.98);
  opacity:.92;
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}
.btn-green{background:var(--green)}
.btn-blue{background:var(--blue)}
.btn-red{background:var(--red)}
.btn-line{background:var(--line)}
.btn-gray{background:var(--gray)}
video{
  width:100%;
  max-height:52vh;
  background:#000;
  border-radius:12px;
  margin-top:10px;
  object-fit:cover;
}
.small{
  font-size:12px;
  color:var(--muted);
}
.status{
  margin-top:8px;
  min-height:20px;
  font-size:14px;
  font-weight:700;
  color:#90caf9;
}
.links{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-top:8px;
}
.links a{
  display:block;
  background:var(--blue);
  color:#fff;
  text-decoration:none;
  text-align:center;
  padding:11px;
  border-radius:10px;
  font-weight:700;
}
.list{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.item{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  transition:background-color .35s ease, box-shadow .35s ease, border-color .35s ease;
}
.item.flash{
  background:#124d2f;
  border-color:#69f0ae;
  box-shadow:0 0 0 2px rgba(105,240,174,.25), 0 0 18px rgba(105,240,174,.18);
}
.item-code{
  font-size:16px;
  font-weight:700;
  word-break:break-all;
}
.item-meta{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
  white-space:pre-wrap;
}
.item-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:8px;
}
.item-actions button,.item-actions a{
  width:auto;
  padding:8px 10px;
  font-size:13px;
}
.badge{
  display:inline-block;
  background:#37474f;
  color:#fff;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
}
.order-preview{
  white-space:pre-wrap;
  background:#0f151a;
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  line-height:1.6;
  font-size:14px;
}
.suggest-wrap{
  margin-top:10px;
}
.suggest-chip{
  display:inline-block;
  background:#37474f;
  color:#fff;
  padding:8px 10px;
  border-radius:999px;
  margin:4px 4px 0 0;
  font-size:13px;
  cursor:pointer;
}
.mt8{margin-top:8px}
.mt10{margin-top:10px}
@media (max-width:640px){
  .links{grid-template-columns:1fr}
}
@media print{
  body{background:#fff;color:#000}
  .no-print{display:none !important}
  .card,.item,.order-preview{
    background:#fff;
    color:#000;
    box-shadow:none;
    border:1px solid #ccc;
  }
}
</style>
</head>

<div class="wrap">
  <h1>電材スキャンPRO 改良版</h1>

  <div class="card no-print">
    <div class="title">読取・入力</div>

    <div class="row">
      <div class="col">
        <input id="manual" placeholder="品番を入力またはスキャン">
      </div>
      <div class="col">
        <button class="btn-green" id="addManualBtn">手入力を追加</button>
      </div>
    </div>

    <div class="row mt8">
      <div class="col"><button class="btn-green" id="startBtn">カメラ起動</button></div>
      <div class="col"><button class="btn-blue" id="scanBtn">スキャン</button></div>
      <div class="col"><button class="btn-gray" id="stopBtn">停止</button></div>
    </div>

    <div class="small mt8">外部 products.json があれば自動読込します。なくても内蔵辞書で動作します。</div>

    <video id="video" autoplay playsinline muted></video>
    <div class="status" id="status"></div>

    <div id="ocrBox" class="mt10" style="display:none;">
      <div class="small">スキャン候補</div>
      <div class="list" id="ocrCandidates"></div>
    </div>

    <div id="linksBox" class="mt10" style="display:none;">
      <div class="small">検索リンク</div>
      <div class="links" id="links"></div>
    </div>

    <div class="suggest-wrap">
      <div class="small">よく使う候補</div>
      <div id="suggestions"></div>
    </div>
  </div>

  <div class="card">
    <div class="title">現在の追加リスト</div>
    <div><span class="badge" id="currentCount">0件</span></div>
    <div class="list mt8" id="currentList"></div>
    <div class="row no-print mt8">
      <div class="col"><button class="btn-red" id="clearCurrentBtn">現在リスト全削除</button></div>
    </div>
  </div>

  <div class="card">
    <div class="title">注文情報</div>
    <div class="row">
      <div class="col"><input id="companyName" placeholder="会社名"></div>
      <div class="col"><input id="personName" placeholder="担当者"></div>
    </div>
    <div class="row mt8">
      <div class="col"><textarea id="remarks" placeholder="備考"></textarea></div>
    </div>
    <div class="row no-print mt8">
      <div class="col"><button class="btn-blue" id="buildOrderBtn">注文文を作成</button></div>
      <div class="col"><button class="btn-green" id="saveHistoryBtn">履歴として保存</button></div>
    </div>
    <div class="order-preview mt8" id="orderPreview">ここに注文文が表示されます。</div>
    <div class="row no-print mt8">
      <div class="col"><button class="btn-green" id="copyBtn">注文文をコピー</button></div>
      <div class="col"><a class="btn btn-line" id="lineBtn" href="#" target="_blank" rel="noopener">LINEで共有</a></div>
      <div class="col"><button class="btn-gray" id="printBtn">印刷</button></div>
    </div>
  </div>

  <div class="card">
    <div class="title">保存履歴</div>
    <div><span class="badge" id="historyCount">0件</span></div>
    <div class="list mt8" id="historyList"></div>
    <div class="row no-print mt8">
      <div class="col"><button class="btn-red" id="clearHistoryBtn">履歴を全削除</button></div>
    </div>
  </div>
</div>

    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");

  function escapeHtml(str){
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")

  function normalizeCode(str){
    return String(str || "")
      .toUpperCase()
      .replace(/[　\s]+/g, "")
      .replace(/[^A-Z0-9\-_/.\u30FC]/g, "");
  }

  function normalizeLoose(str){

  function scoreCode(code){
    let s = 0;
    if(code.length >= 4) s += 2;
    if(code.length >= 6) s += 3;
    if(/[A-Z]/.test(code)) s += 4;
    if(/\d/.test(code)) s += 4;
    if(/[A-Z].*\d|\d.*[A-Z]/.test(code)) s += 4;
    if(/[-/.]/.test(code)) s += 2;
    if(/^[A-Z0-9\-/.]+$/.test(code)) s += 3;
    if(/^[0-9]+$/.test(code)) s -= 5;
    if(code.length > 24) s -= 3;
    return s;
  }

  function extractCodes(text){
    const raw = (String(text || "").toUpperCase().match(/[A-Z0-9][A-Z0-9\-/.]{2,24}/g) || []);
    const cleaned = raw
      .map(v => v.replace(/^[\-/.]+|[\-/.]+$/g, ""))
      .filter(v => v.length >= 3);
    return Array.from(new Set(cleaned)).sort((a, b) => scoreCode(b) - scoreCode(a));
  }

  function fixCommonOcrErrors(code){
    const p = normalizeCode(code);
    const arr = [
      p,
      p.replace(/I/g, "1"),
      p.replace(/O/g, "0"),
      p.replace(/S/g, "5"),
      p.replace(/B/g, "8"),
      p.replace(/Z/g, "2"),
      p.replace(/Q/g, "0")
    ];
    return arr.filter((v, i, a) => v && a.indexOf(v) === i);
  }

  function levenshtein(a, b){
    const m = a.length;
    const n = b.length;
    const dp = [];
    for(let i = 0; i <= m; i++){
      dp[i] = [];
      for(let j = 0; j <= n; j++) dp[i][j] = 0;
    }
    for(let i = 0; i <= m; i++) dp[i][0] = i;
    for(let j = 0; j <= n; j++) dp[0][j] = j;

    for(let i = 1; i <= m; i++){
      for(let j = 1; j <= n; j++){
        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
        dp[i][j] = Math.min(
          dp[i - 1][j] + 1,
          dp[i][j - 1] + 1,
          dp[i - 1][j - 1] + cost
        );
      }
    }
    return dp[m][n];
  }

        const v = variants[j];
        const looseV = normalizeLoose(v);

        if(v === code) bestScore = Math.max(bestScore, 100);
        else if(looseV === looseCode) bestScore = Math.max(bestScore, 96);
        else if(code.indexOf(v) === 0 || v.indexOf(code) === 0) bestScore = Math.max(bestScore, 90);
        else if(looseCode.indexOf(looseV) >= 0 || looseV.indexOf(looseCode) >= 0) bestScore = Math.max(bestScore, 84);
        else{
          const dist = levenshtein(looseV, looseCode);
          const maxLen = Math.max(looseV.length, looseCode.length) || 1;
          const sim = Math.round((1 - dist / maxLen) * 100);
          if(sim >= 60) bestScore = Math.max(bestScore, sim);
        }

        if(Array.isArray(p.aliases)){
          for(let k = 0; k < p.aliases.length; k++){
            const a = normalizeCode(p.aliases[k]);
            const la = normalizeLoose(a);
            if(v === a) bestScore = Math.max(bestScore, 94);
            else if(looseV === la) bestScore = Math.max(bestScore, 91);
          }
        }
      }

      if(bestScore >= 60){
        results.push({
          code: p.code,
          name: p.name,
          maker: p.maker,
          category: p.category,
          score: bestScore
        });
      }
    }

    return results.sort((a, b) => b.score - a.score).slice(0, 5);
  }

  function getBestProductInfo(code){
    const matches = matchProducts(code);
    if(matches.length) return matches[0];

    for(let i = 0; i < PRODUCTS.length; i++){
      if(normalizeCode(PRODUCTS[i].code) === normalizeCode(code)) return PRODUCTS[i];
    }
    return null;
  }

  async function loadExternalProducts(){
    try{
      const res = await fetch("products.json", { cache: "no-store" });
      if(!res.ok) return false;

      const data = await res.json();
      if(!Array.isArray(data)) return false;

      const map = new Map();

      for(let i = 0; i < PRODUCTS.length; i++){
        const p = PRODUCTS[i];
        map.set(normalizeCode(p.code), p);
      }

      for(let i = 0; i < data.length; i++){
        const p = data[i];
        if(!p || !p.code) continue;
        map.set(normalizeCode(p.code), {
          code: p.code,
          name: p.name || "",
          maker: p.maker || "",
          category: p.category || "",
          aliases: Array.isArray(p.aliases) ? p.aliases : []
        });
      }

      PRODUCTS = Array.from(map.values());
      return true;
    }catch(e){
      return false;
    }
  }

  async function getWorker(){
    if(worker) return worker;

    setStatus("OCR準備中...");
    worker = await Tesseract.createWorker("eng");
    await worker.setParameters({
      tessedit_pageseg_mode: "7",
      tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_/.",
      preserve_interword_spaces: "1",
      load_system_dawg: "0",
      load_freq_dawg: "0",
      user_defined_dpi: "300"
    });
    return worker;
  }

  async function attachStreamToVideo(s){
    els.video.setAttribute("playsinline", "true");
    els.video.setAttribute("muted", "true");
    els.video.muted = true;
    els.video.autoplay = true;
    els.video.srcObject = s;

    try{
      await els.video.play();
    }catch(e){
      await new Promise(resolve => setTimeout(resolve, 250));
      await els.video.play();
    }

    await new Promise((resolve) => {
      if(els.video.readyState >= 2) return resolve();
      const onLoaded = () => {
        els.video.removeEventListener("loadedmetadata", onLoaded);
        resolve();
      };
      els.video.addEventListener("loadedmetadata", onLoaded);
      setTimeout(resolve, 1500);
    });
  }

  async function getBackCameraDeviceId(){
    if(!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return "";
    try{
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videos = devices.filter(d => d.kind === "videoinput");
      if(!videos.length) return "";

      const keywords = ["back", "rear", "environment", "背面", "アウト"];
      for(let i = 0; i < videos.length; i++){
        const label = (videos[i].label || "").toLowerCase();
        for(let j = 0; j < keywords.length; j++){
          if(label.indexOf(keywords[j]) >= 0) return videos[i].deviceId;
        }
      }
      return videos.length > 1 ? videos[videos.length - 1].deviceId : videos[0].deviceId;
    }catch(e){
      return "";
    }
  }

  async function tryGetUserMedia(constraintsList){
    let lastError = null;
    for(let i = 0; i < constraintsList.length; i++){
      try{
        const s = await navigator.mediaDevices.getUserMedia(constraintsList[i]);
        return s;
      }catch(e){
        lastError = e;
      }
    }
    throw lastError || new Error("camera_start_failed");
  }

  async function startCamera(){
    if(isStartingCamera) return;
    isStartingCamera = true;
    els.startBtn.disabled = true;

    try{
      if(!isSecureContextLike()){
        throw new Error("insecure_context");
      }

      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        throw new Error("camera_unsupported");
      }

      stopCamera();
      setStatus("カメラ起動中...");

      let deviceId = "";
      try{
        const temp = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
        temp.getTracks().forEach(t => t.stop());
        deviceId = await getBackCameraDeviceId();
      }catch(e){
      }

      const constraintsList = [];

      if(deviceId){
        constraintsList.push({
          video: {
            deviceId: { exact: deviceId },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
      }

      constraintsList.push(
        {
          video: {
            facingMode: { exact: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        },
        {
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        },
        {
          video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        },
        {
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        },
        {
          video: true,
          audio: false
        }
      );

      let lastErr = null;
      for(let retry = 0; retry < 2; retry++){
        try{
          stream = await tryGetUserMedia(constraintsList);
          await attachStreamToVideo(stream);
          lastErr = null;
          break;
        }catch(e){
          lastErr = e;
          await new Promise(resolve => setTimeout(resolve, 300));
        }
      }

      if(lastErr) throw lastErr;

      setStatus("カメラ起動中", "success");
    }catch(e){
      console.error(e);
      stopCamera();

      if(String(e && e.message) === "insecure_context"){
        setStatus("HTTPSまたはlocalhostで開いてください", "error");
        alert("カメラは HTTPS または localhost で開く必要があります。");
      }else if(String(e && e.message) === "camera_unsupported"){
        setStatus("このブラウザはカメラ非対応です", "error");
        alert("このブラウザではカメラ機能が使えません。");
      }else{
        setStatus("カメラ起動失敗", "error");
        alert("カメラを起動できませんでした。Safari/Chrome本体で開き、カメラ権限とHTTPSを確認してください。");
      }
    }finally{
      isStartingCamera = false;
      els.startBtn.disabled = false;
    }
  }

  function stopCamera(){
    if(stream){
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    if(els.video){
      try{ els.video.pause(); }catch(e){}
      els.video.srcObject = null;
    }
    setStatus("カメラ停止");

  function captureFrame(){
    const canvas = document.createElement("canvas");
    canvas.width = els.video.videoWidth;
    canvas.height = els.video.videoHeight;
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(els.video, 0, 0);
    return canvas;
  }

  function cropArea(canvas, xRatio, yRatio, wRatio, hRatio){
    const w = canvas.width;
    const h = canvas.height;
    const sx = Math.max(0, Math.floor(w * xRatio));
    const sy = Math.max(0, Math.floor(h * yRatio));
    const sw = Math.max(1, Math.floor(w * wRatio));
    const sh = Math.max(1, Math.floor(h * hRatio));

    const out = document.createElement("canvas");
    out.width = sw;
    out.height = sh;
    const ctx = out.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(canvas, sx, sy, sw, sh, 0, 0, sw, sh);
    return out;
  }

  function upscale(canvas, scale){
    const s = scale || 2;
    const out = document.createElement("canvas");
    out.width = canvas.width * s;
    out.height = canvas.height * s;
    const ctx = out.getContext("2d", { willReadFrequently: true });
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(canvas, 0, 0, out.width, out.height);
    return out;
  }

  function preprocess(canvas, mode){
    const out = document.createElement("canvas");
    out.width = canvas.width;
    out.height = canvas.height;
    const ctx = out.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(canvas, 0, 0);

    const img = ctx.getImageData(0, 0, out.width, out.height);
    const d = img.data;
    const w = out.width;
    const h = out.height;

    for(let i = 0; i < d.length; i += 4){
      let g = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
      if(mode === "strong"){
        g = (g - 128) * 2.4 + 128;
      }else if(mode === "sharp"){
        g = (g - 128) * 2.0 + 128;
      }else{
        g = (g - 128) * 1.8 + 128;
      }
      g = Math.max(0, Math.min(255, g));
      d[i] = d[i + 1] = d[i + 2] = g;
    }

    // 簡易ノイズ除去
    for(let y = 1; y < h - 1; y++){
      for(let x = 1; x < w - 1; x++){
        const idx = (y * w + x) * 4;
        const c = d[idx];
        const n1 = d[((y - 1) * w + x) * 4];
        const n2 = d[((y + 1) * w + x) * 4];
        const n3 = d[(y * w + (x - 1)) * 4];
        const n4 = d[(y * w + (x + 1)) * 4];
        const avg = (n1 + n2 + n3 + n4 + c) / 5;
        d[idx] = d[idx + 1] = d[idx + 2] = avg;
      }
    }

    // 簡易シャープ寄り二値化
    for(let i = 0; i < d.length; i += 4){
      let g = d[i];
      if(mode === "strong"){
        g = g > 145 ? 255 : g < 95 ? 0 : g;
      }else if(mode === "sharp"){
        g = g > 150 ? 255 : g < 105 ? 0 : g;
      }else{
        g = g > 155 ? 255 : g < 110 ? 0 : g;
      }
      d[i] = d[i + 1] = d[i + 2] = g;
    }

    ctx.putImageData(img, 0, 0);
    return out;
  }

  async function recognizeCanvas(targetCanvas){
    const w = await getWorker();
    const ret = await w.recognize(targetCanvas);
    return {
      text: ret && ret.data && ret.data.text ? ret.data.text : "",
      confidence: ret && ret.data && typeof ret.data.confidence === "number" ? ret.data.confidence : 0
    };
  }

  async function scan(){
    if(isScanning) return;

    if(!stream || !els.video.srcObject){
      alert("先にカメラを起動してください");
      return;
    }

    if(!els.video.videoWidth || els.video.readyState < 2){
      alert("カメラ映像の準備がまだできていません。少し待ってから再度お試しください。");
      return;
    }

    isScanning = true;
    els.scanBtn.disabled = true;
    setStatus("読取中...");
    els.ocrBox.style.display = "none";

    try{
      const full = captureFrame();

      const passes = [
        { label:"中央", canvas: preprocess(upscale(cropArea(full, 0.11, 0.38, 0.78, 0.24), 2), "normal"), weight:1.15 },
        { label:"上",   canvas: preprocess(upscale(cropArea(full, 0.11, 0.22, 0.78, 0.24), 2), "strong"), weight:1.00 },
        { label:"下",   canvas: preprocess(upscale(cropArea(full, 0.11, 0.54, 0.78, 0.24), 2), "strong"), weight:1.00 },
        { label:"全体", canvas: preprocess(upscale(cropArea(full, 0.00, 0.00, 1.00, 1.00), 1), "sharp"), weight:0.85 },
        { label:"中央細帯", canvas: preprocess(upscale(cropArea(full, 0.12, 0.43, 0.76, 0.14), 3), "sharp"), weight:1.25 }
      ];

      const tally = {};

      for(let i = 0; i < passes.length; i++){
        setStatus("読取中... " + (i + 1) + "/5");
        const r = await recognizeCanvas(passes[i].canvas);
        const codes = extractCodes(r.text);

        for(let j = 0; j < codes.length; j++){
          const code = normalizeCode(codes[j]);
          if(!code) continue;

          let weight = 0;
          weight += scoreCode(code);
          weight += Math.max(0, Math.min(24, r.confidence / 4));
          weight *= passes[i].weight;

          const matched = matchProducts(code);
          if(matched.length){
            weight += 18;
            weight += matched[0].score / 8;
          }

          tally[code] = (tally[code] || 0) + weight;
        }
      }

      currentScanCandidates = Object.entries(tally)
        .sort((a, b) => b[1] - a[1])
        .map(v => v[0])
        .slice(0, 8);

      renderCandidates();
      setStatus(currentScanCandidates.length ? "候補を取得しました" : "候補なし", currentScanCandidates.length ? "success" : undefined);

    }catch(e){
      console.error(e);
      setStatus("読取失敗", "error");
      alert("読み取りに失敗しました。明るい場所で、品番を中央に大きく写して再度お試しください。");
    }finally{
      isScanning = false;
      els.scanBtn.disabled = false;
    }
  }

  function renderCandidates(){

    if(!currentScanCandidates.length){

      html += `

          <div class="item-code">${escapeHtml(code)}</div>
          <div class="item-meta">${escapeHtml(maker)}${maker && category ? " / " : ""}${escapeHtml(category)}</div>
          <div class="item-meta">${escapeHtml(name)}</div>
          <div class="item-actions">
            <button class="btn-green" onclick="window.useScanCandidate(${i})">この候補を使う</button>
            <button class="btn-red" onclick="window.removeScanCandidate(${i})">消す</button>
          </div>

      `;
    }
    els.ocrCandidates.innerHTML = html;
  }

  function cleanupHistory(){

    const list = load(STORAGE_KEYS.history, []);

  function addFreq(code){
    const p = normalizeCode(code);
    if(!p) return;
    const freq = getFreq();
    freq[p] = (freq[p] || 0) + 1;
    saveFreq(freq);
    renderSuggestions();
  }

  function renderSuggestions(){
    const freq = getFreq();
    const entries = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 12);

    if(!entries.length){
      els.suggestions.innerHTML = '<span class="small">まだ候補はありません。</span>';
      return;
    }

    els.suggestions.innerHTML = entries.map(([code, count]) =>
      `<span class="suggest-chip" onclick="window.pickSuggestion('${escapeHtml(code)}')">${escapeHtml(code)} (${count})</span>`
    ).join("");
  }

  function addCurrentItem(code){
    const p = normalizeCode(code);
    if(!p) return null;

    const info = getBestProductInfo(p);
    const list = getCurrent();

    for(let i = 0; i < list.length; i++){
      if(list[i].code === p){
        list[i].qty = (list[i].qty || 1) + 1;
        list[i].updatedAt = nowIso();
        if(info){
          if(!list[i].name) list[i].name = info.name || "";
          if(!list[i].maker) list[i].maker = info.maker || "";
          if(!list[i].category) list[i].category = info.category || "";
        }
        saveCurrent(list);
        addFreq(p);
        renderCurrent();
        buildOrderText();
        return list[i].id;
      }
    }

    const id = String(Date.now()) + "_" + Math.random().toString(16).slice(2);

    list.unshift({
      id: id,
      code: p,
      name: info && info.name ? info.name : "",
      maker: info && info.maker ? info.maker : "",
      category: info && info.category ? info.category : "",
      qty: 1,
      createdAt: nowIso(),
      updatedAt: nowIso()
    });

    saveCurrent(list);
    addFreq(p);
    renderCurrent();
    buildOrderText();
    return id;
  }

  function flashAddedRow(id){
    if(!id) return;
    const nodes = document.querySelectorAll("[data-item-id]");
    for(let i = 0; i < nodes.length; i++){
      if(nodes[i].getAttribute("data-item-id") === id){
        nodes[i].classList.add("flash");
        if(nodes[i].scrollIntoView){
          nodes[i].scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
        setTimeout(() => {
          nodes[i].classList.remove("flash");
        }, 1200);
        break;
      }
    }
  }

    const normalized = normalizeCode(els.manual.value);
    if(!normalized){

      return;
    }

    renderLinks(normalized);
    const addedId = addCurrentItem(normalized);
    flashAddedRow(addedId);

  function useScanCandidate(index){
    if(index < 0 || index >= currentScanCandidates.length) return;

    const normalized = normalizeCode(currentScanCandidates[index]);
    if(!normalized){
      setStatus("空の候補は追加できません", "error");
      return;
    }

    els.manual.value = normalized;
    renderLinks(normalized);

    const addedId = addCurrentItem(normalized);

    currentScanCandidates.splice(index, 1);
    renderCandidates();

    flashAddedRow(addedId);
    setStatus("追加しました: " + normalized, "success");
    els.manual.value = "";
  }

  function removeScanCandidate(index){
    if(index < 0 || index >= currentScanCandidates.length) return;
    currentScanCandidates.splice(index, 1);
    renderCandidates();
    setStatus("候補を削除しました", "success");
  }

  function updateQty(id, delta){
    const list = getCurrent();
    for(let i = 0; i < list.length; i++){
      if(list[i].id === id){
        list[i].qty = Math.max(1, (list[i].qty || 1) + delta);
        list[i].updatedAt = nowIso();
        break;
      }
    }
    saveCurrent(list);
    renderCurrent();
    buildOrderText();
  }

    renderCurrent();

  function buildOrderText(){
    const company = els.companyName.value.trim();
    const person = els.personName.value.trim();
    const remarks = els.remarks.value.trim();
    const list = getCurrent();

    if(!list.length){
      els.orderPreview.textContent = "ここに注文文が表示されます。";
      updateLineLink("");
      return "";
    }

    const lines = [];
    lines.push("【注文リスト】");
    if(company) lines.push("会社名: " + company);
    if(person) lines.push("担当者: " + person);
    lines.push("");
    lines.push("■品番一覧");

    for(let i = 0; i < list.length; i++){
      const item = list[i];
      let line = (i + 1) + ". " + item.code;
      if(item.name) line += " (" + item.name + ")";
      if(item.maker) line += " / " + item.maker;
      line += " × " + (item.qty || 1);
      lines.push(line);
    }

    if(remarks){
      lines.push("");
      lines.push("■備考");
      lines.push(remarks);
    }

    lines.push("");
    lines.push("作成日時: " + formatDate(nowIso()));

    const text = lines.join("\n");
    els.orderPreview.textContent = text;
    updateLineLink(text);
    return text;
  }

  function updateLineLink(text){
    els.lineBtn.href = text ? "https://line.me/R/msg/text/?" + encodeURIComponent(text) : "#";
  }

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      setStatus("コピーしました", "success");
    }catch(e){
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
      setStatus("コピーしました", "success");
    }
  }

  function saveCurrentToHistory(){
    const current = getCurrent();
    if(!current.length){
      alert("保存するリストがありません");
      return;
    }

    const text = buildOrderText();
    const history = getHistory();

    history.unshift({
      id: String(Date.now()) + "_" + Math.random().toString(16).slice(2),
      createdAt: nowIso(),
      companyName: els.companyName.value.trim(),
      personName: els.personName.value.trim(),
      remarks: els.remarks.value.trim(),
      items: current,
      text: text
    });

    saveHistory(history);
    renderHistory();
    setStatus("履歴に保存しました", "success");
  }

  function removeHistory(id){
    const list = getHistory().filter(v => v.id !== id);
    saveHistory(list);
    renderHistory();
  }

  function clearHistory(){
    if(!confirm("履歴を全削除しますか？")) return;
    saveHistory([]);
    renderHistory();
    setStatus("履歴を全削除しました", "success");
  }

  function restoreHistory(id){
    const item = getHistory().find(v => v.id === id);
    if(!item) return;

    saveCurrent(item.items || []);
    els.companyName.value = item.companyName || "";
    els.personName.value = item.personName || "";
    els.remarks.value = item.remarks || "";

    renderCurrent();
    buildOrderText();
    setStatus("履歴を読み込みました", "success");
  }

  function renderHistory(){
    const list = getHistory();
    els.historyCount.textContent = list.length + "件";

    if(!list.length){
      els.historyList.innerHTML = '<div class="small">保存履歴はありません。</div>';
      return;
    }

    let html = "";
    for(let i = 0; i < list.length; i++){
      const item = list[i];
      const summary = (item.items || []).map(v => v.code + " × " + (v.qty || 1)).join(", ");

      html += `
        <div class="item">
          <div class="item-code">${escapeHtml(item.companyName || "会社名未入力")} / ${escapeHtml(item.personName || "担当者未入力")}</div>
          <div class="item-meta">${formatDate(item.createdAt)}</div>
          <div class="item-meta">${escapeHtml(summary)}</div>
          <div class="item-actions no-print">
            <button class="btn-blue" onclick="window.restoreHistoryItem('${item.id}')">読み込む</button>
            <button class="btn-green" onclick="window.copyHistoryItem('${item.id}')">コピー</button>
            <button class="btn-red" onclick="window.removeHistoryItem('${item.id}')">削除</button>
          </div>
        </div>
      `;
    }

    els.historyList.innerHTML = html;
  }

  function bindEvents(){
    els.startBtn.addEventListener("click", startCamera);
    els.scanBtn.addEventListener("click", scan);
    els.stopBtn.addEventListener("click", stopCamera);
    els.addManualBtn.addEventListener("click", addManualInput);
    els.buildOrderBtn.addEventListener("click", buildOrderText);
    els.saveHistoryBtn.addEventListener("click", saveCurrentToHistory);

    els.manual.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        addManualInput();
      }
    });

    els.manual.addEventListener("input", () => {
      const normalized = normalizeCode(els.manual.value);
      renderLinks(normalized);
    });

    els.copyBtn.addEventListener("click", () => {
      const text = buildOrderText();
      if(!text){
        alert("コピーする注文文がありません");
        return;
      }
      copyText(text);
    });

    els.printBtn.addEventListener("click", () => {
      buildOrderText();
      window.print();
    });

    els.clearCurrentBtn.addEventListener("click", clearCurrent);
    els.clearHistoryBtn.addEventListener("click", clearHistory);

    els.companyName.addEventListener("input", buildOrderText);
    els.personName.addEventListener("input", buildOrderText);
    els.remarks.addEventListener("input", buildOrderText);
  }

  async function registerServiceWorker(){
    if("serviceWorker" in navigator){
      try{
        await navigator.serviceWorker.register("./sw.js");
      }catch(e){
      }
    }
  }

  window.useScanCandidate = useScanCandidate;
  window.removeScanCandidate = removeScanCandidate;
  window.changeQty = updateQty;
  window.removeCurrentItem = removeCurrent;
  window.restoreHistoryItem = restoreHistory;
  window.removeHistoryItem = removeHistory;
  window.copyHistoryItem = function(id){
    const item = getHistory().find(v => v.id === id);
    if(item && item.text) copyText(item.text);
  };
  window.pickSuggestion = function(code){
    const normalized = normalizeCode(code);
    if(!normalized) return;
    els.manual.value = normalized;
    renderLinks(normalized);
    const addedId = addCurrentItem(normalized);
    flashAddedRow(addedId);
    setStatus("追加しました: " + normalized, "success");
    els.manual.value = "";
  };

  async function init(){
    bindEvents();
    cleanupHistory();
    renderCurrent();
    renderHistory();
    renderSuggestions();
    buildOrderText();

    const loaded = await loadExternalProducts();
    await registerServiceWorker();

    if(!isSecureContextLike()){
      setStatus("準備完了 / カメラはHTTPSまたはlocalhostで利用してください");
    }else{
      setStatus("準備完了 / 辞書 " + PRODUCTS.length + "件" + (loaded ? " / 外部JSON読込OK" : ""));
    }
  }

  init();
})();
</script>
</body>
</html>
