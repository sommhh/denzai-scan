<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電材スキャンPRO 神版</title>

<link rel="manifest" href="manifest.json">

<style>
body{margin:0;background:#101418;color:#fff;font-family:sans-serif}
.wrap{max-width:900px;margin:auto;padding:10px}
.card{background:#1b2229;padding:10px;border-radius:12px;margin:10px 0}
button{padding:12px;border:none;border-radius:10px;color:#fff;font-weight:bold}
.btn{background:#2962ff}
.btn2{background:#00c853}
video{width:100%;border-radius:10px;background:#000}
.item{background:#24303a;padding:8px;margin:6px 0;border-radius:10px}
</style>
</head>

<body>
<div class="wrap">

<h2>電材スキャンPRO 神版</h2>

<div class="card">
<input id="manual" placeholder="品番入力">
<button class="btn2" onclick="addManual()">追加</button>

<button class="btn" onclick="startCamera()">カメラ</button>
<button class="btn" onclick="scan()">スキャン</button>

<video id="video" autoplay playsinline></video>
<div id="status"></div>
</div>

<div class="card">
<h3>リスト</h3>
<div id="list"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
let PRODUCTS=[];
let worker=null;
let stream=null;
let list=[];

async function loadDB(){
  try{
    const res=await fetch("products.json");
    PRODUCTS=await res.json();
  }catch(e){
    PRODUCTS=[{code:"WTF1502WK",name:"コンセント"}];
  }
}

function normalize(s){
  return s.toUpperCase().replace(/[^A-Z0-9]/g,"");
}

function match(code){
  code=normalize(code);
  return PRODUCTS.find(p=>normalize(p.code)===code);
}

async function startCamera(){
  stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;
}

function capture(){
  const c=document.createElement("canvas");
  c.width=video.videoWidth;
  c.height=video.videoHeight;
  c.getContext("2d").drawImage(video,0,0);
  return c;
}

function preprocess(c){
  const ctx=c.getContext("2d");
  let img=ctx.getImageData(0,0,c.width,c.height);
  for(let i=0;i<img.data.length;i+=4){
    let g=(img.data[i]+img.data[i+1]+img.data[i+2])/3;
    g=g>140?255:0;
    img.data[i]=img.data[i+1]=img.data[i+2]=g;
  }
  ctx.putImageData(img,0,0);
  return c;
}

async function getWorker(){
  if(worker)return worker;
  worker=await Tesseract.createWorker("eng");
  return worker;
}

async function scan(){
  status.innerText="読取中...";
  const c=preprocess(capture());
  const w=await getWorker();
  const r=await w.recognize(c);
  let txt=r.data.text;
  let codes=txt.match(/[A-Z0-9\-]{3,}/g)||[];
  if(codes.length){
    addItem(codes[0]);
  }
  status.innerText="完了";
}

function addManual(){
  addItem(manual.value);
  manual.value="";
}

function addItem(code){
  code=normalize(code);
  let p=match(code);
  list.push({code,name:p?p.name:""});
  render();
}

function render(){
  listDiv.innerHTML=list.map(v=>`
    <div class="item">
      ${v.code} ${v.name}
    </div>
  `).join("");
}

window.addEventListener("beforeunload",async()=>{
  if(worker)await worker.terminate();
});

loadDB();
</script>

<script>
if('serviceWorker'in navigator){
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
