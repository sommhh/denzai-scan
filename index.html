<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>電材スキャンPRO ガイド枠版</title>

<body>

<!-- ★あなたの元HTMLそのまま（UI部分そのまま維持） -->

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
(() => {
"use strict";

/* =========================
   ★追加：ガイド枠完全一致
========================= */
function getGuideRect(){
  const videoRect = els.video.getBoundingClientRect();
  const guideRect = document.querySelector(".guide-box").getBoundingClientRect();

  return {
    x: (guideRect.left - videoRect.left) / videoRect.width,
    y: (guideRect.top - videoRect.top) / videoRect.height,
    w: guideRect.width / videoRect.width,
    h: guideRect.height / videoRect.height
  };
}

/* =========================
   OCR強化
========================= */
async function getWorker(){
  if(worker) return worker;

  setStatus("OCR準備中...");
  worker = await Tesseract.createWorker("eng");

  await worker.setParameters({
    tessedit_pageseg_mode: "7",
    tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_/.",
    tessedit_ocr_engine_mode: "1" // ★追加
  });

  return worker;
}

/* =========================
   scan関数（完全修正版）
========================= */
async function scan(){
  if(isScanning) return;

  if(!stream || !els.video.srcObject){
    alert("先にカメラを起動してください");
    return;
  }

  if(!els.video.videoWidth){
    alert("カメラ準備中");
    return;
  }

  isScanning = true;
  els.scanBtn.disabled = true;
  setStatus("読取中...");
  els.ocrBox.style.display = "none";

  try{
    const full = captureFrame();
    const rect = getGuideRect();

    const passes = [
      {
        label:"ガイド枠",
        canvas: preprocess(
          upscale(cropArea(full, rect.x, rect.y, rect.w, rect.h),3),
          "sharp"
        ),
        weight:2.0
      },
      {
        label:"中央ライン",
        canvas: preprocess(
          upscale(cropArea(full, rect.x, rect.y + rect.h*0.4, rect.w, rect.h*0.2),4),
          "strong"
        ),
        weight:2.3
      },
      {
        label:"全体",
        canvas: preprocess(
          upscale(full,1),
          "normal"
        ),
        weight:0.6
      }
    ];

    const tally = {};

    for(let i=0;i<passes.length;i++){
      setStatus("読取中... "+(i+1)+"/"+passes.length);

      const r = await recognizeCanvas(passes[i].canvas);
      const codes = extractCodes(r.text);

      for(let code of codes){
        const c = normalizeCode(code);
        if(!c) continue;

        let score = scoreCode(c);
        score += Math.min(30, r.confidence / 3);
        score *= passes[i].weight;

        tally[c] = (tally[c] || 0) + score;
      }
    }

    let merged = Object.entries(tally)
      .map(([code,score])=>({code,score}))
      .sort((a,b)=>b.score-a.score);

    currentScanCandidates = merged.map(v=>v.code).slice(0,10);

    /* ===== fallback追加 ===== */
    if(!currentScanCandidates.length){
      const fallback = extractCodes(Object.keys(tally).join(" "));
      currentScanCandidates = fallback.slice(0,5);
    }

    renderCandidates();

    setStatus(
      currentScanCandidates.length ? "候補取得" : "候補なし",
      currentScanCandidates.length ? "success" : ""
    );

  }catch(e){
    console.error(e);
    setStatus("読取失敗","error");
  }

  isScanning = false;
  els.scanBtn.disabled = false;
}

/* =========================
   スコア緩和（ここだけ変更）
========================= */
function matchProducts(input){
  const variants = expandOcrVariants(input);
  const results = [];

  for(let p of PRODUCTS){
    let bestScore = 0;

    for(let v of variants){
      if(v === p.code) bestScore = 100;
    }

    if(bestScore >= 50){ // ★62→50に変更
      results.push({...p, score:bestScore});
    }
  }

  return results.sort((a,b)=>b.score-a.score);
}

/* =========================
   検索強化（差し替え）
========================= */
function renderLinks(code){
  const p = normalizeCode(code);
  if(!p){
    els.linksBox.style.display = "none";
    els.links.innerHTML = "";
    return;
  }

  els.linksBox.style.display = "block";

  const queries = [
    p,
    p + " 電材",
    p + " 型番",
    p + " 仕様",
    p + " カタログ",
    p + " メーカー"
  ];

  els.links.innerHTML = queries.map(q =>
    `<a href="https://www.google.com/search?q=${encodeURIComponent(q)}" target="_blank">${q}</a>`
  ).join("");
}

/* =========================
   ★それ以外は全部元コードそのまま
========================= */

})();
</script>

</body>
</html>
