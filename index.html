<script>

/* ===== 追加：OCR強化設定 ===== */
function fixCommonOcrErrorsPro(code){
  const base = normalizeCode(code);
  return [
    base,
    base.replace(/I/g,"1"),
    base.replace(/1/g,"I"),
    base.replace(/O/g,"0"),
    base.replace(/0/g,"O"),
    base.replace(/S/g,"5"),
    base.replace(/5/g,"S"),
    base.replace(/B/g,"8"),
    base.replace(/8/g,"B"),
    base.replace(/Z/g,"2"),
    base.replace(/2/g,"Z")
  ];
}

/* ===== 上書き：matchProducts 強化 ===== */
function matchProducts(input){
  const variants = fixCommonOcrErrorsPro(input);
  const results = [];

  for(const p of PRODUCTS){
    let score = 0;

    for(const v of variants){
      if(normalizeCode(p.code) === v) score = 100;
      else if(normalizeLoose(p.code) === normalizeLoose(v)) score = Math.max(score,95);
    }

    if(score >= 60){
      results.push({...p, score});
    }
  }

  return results.sort((a,b)=>b.score-a.score).slice(0,5);
}

/* ===== 上書き：scan（3領域化） ===== */
async function scan(){
  if(isScanning) return;
  if(!stream) return alert("カメラ起動して");

  isScanning = true;
  setStatus("読取中...");

  try{
    const full = captureFrame();

    const areas = [
      cropCenter(full),
      cropUpper(full),
      cropLower(full) // ★追加
    ];

    let tally = {};

    for(const area of areas){
      const img = preprocess(upscale(area,2),"strong");
      const r = await recognizeCanvas(img);

      const codes = extractCodes(r.text);

      codes.forEach(c=>{
        const n = normalizeCode(c);
        tally[n] = (tally[n]||0) + 1;
      });
    }

    currentScanCandidates = Object.entries(tally)
      .sort((a,b)=>b[1]-a[1])
      .map(v=>v[0])
      .slice(0,8);

    renderCandidates();
    setStatus("候補取得", "success");

  }catch(e){
    setStatus("読取失敗","error");
  }

  isScanning = false;
}

/* ===== 追加：下クロップ ===== */
function cropLower(canvas){
  const w = canvas.width;
  const h = canvas.height;

  const out = document.createElement("canvas");
  out.width = w * 0.8;
  out.height = h * 0.2;

  const ctx = out.getContext("2d");
  ctx.drawImage(canvas, w*0.1, h*0.7, w*0.8, h*0.2, 0,0,out.width,out.height);

  return out;
}

/* ===== 修正：履歴保存（deep copy） ===== */
function saveCurrentToHistory(){
  const current = getCurrent();
  const history = getHistory();

  history.unshift({
    id: Date.now(),
    createdAt: nowIso(),
    items: JSON.parse(JSON.stringify(current)) // ★修正
  });

  saveHistory(history);
}

/* ===== 修正：カメラ（背面固定） ===== */
async function startCamera(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{exact:"environment"}}
    });
  }catch{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"environment"}
    });
  }

  video.srcObject = stream;
}

/* ===== 修正：worker解放 ===== */
window.addEventListener("beforeunload", async ()=>{
  if(worker){
    await worker.terminate();
    worker=null;
  }
});

/* ===== PWA自動 ===== */
(function(){
  if('serviceWorker' in navigator){
    const code = `
      self.addEventListener('fetch',e=>{
        e.respondWith(fetch(e.request).catch(()=>caches.match('./')))
      });
    `;
    const blob = new Blob([code],{type:"text/javascript"});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url);
  }
})();

</script>
